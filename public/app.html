<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#0F172A"><link rel="manifest" href="/manifest.json"><link rel="icon" href="/icon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="/icon.svg"><title>Referix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>:root{--primary:#0066FF;--primary-dark:#0047B3}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{background:linear-gradient(135deg,#0F172A,#1E293B);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
body::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(0,102,255,.08) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:absolute;bottom:-50%;left:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 70%);pointer-events:none}
.card{background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border-radius:20px;padding:32px;width:100%;max-width:380px;box-shadow:0 25px 80px rgba(0,0,0,.4);animation:fadeUp .5s ease;position:relative;z-index:1;border:1px solid rgba(255,255,255,.1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{width:56px;height:56px;background:linear-gradient(135deg,var(--primary),#7C3AED);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(0,102,255,.25)}
h2{text-align:center;font-size:18px;font-weight:700;color:#111827;margin-bottom:2px;letter-spacing:-.3px}
.sub{text-align:center;font-size:13px;color:#6B7280;margin-bottom:24px}
.apps{display:flex;flex-direction:column;gap:10px}
.app-btn{display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #E5E7EB;border-radius:14px;text-decoration:none;transition:all .2s}
.app-btn:hover{border-color:var(--primary);background:#F5F9FF;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,102,255,.08)}
.app-btn .icon{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.app-btn .name{font-size:14px;font-weight:600;color:#111827;letter-spacing:-.2px}.app-btn .desc{font-size:11px;color:#6B7280}
.app-btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-color:var(--primary)}.app-btn.primary .name{color:#fff}.app-btn.primary .desc{color:rgba(255,255,255,.7)}.app-btn.primary:hover{box-shadow:0 8px 24px rgba(0,102,255,.3)}
.logout{text-align:center;margin-top:20px;font-size:12px;color:#9CA3AF;cursor:pointer;transition:color .2s}
.logout:hover{color:#6B7280}
.svg-icon,.icon svg{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.svg-icon svg{width:100%;height:100%}
</style>
</head>
<body>
<div id="app"></div>
<script src="/icons.js?v=2"></script>
<script>
const API='https://referix-api.reto-diario.workers.dev';
const user=JSON.parse(localStorage.getItem('referix_user')||'null');
const role=user?.role||'';
const ROLE_APPS={
  ADMIN:[{icon:'sales',name:'Ir a ventas',desc:'Registrar una venta en menos de 2 minutos',path:'/sales.html',primary:true},
    {icon:'console',name:'Consola',desc:'Administración, planes, comisiones y datos',path:'/console.html'},
    {icon:'partner',name:'Partner',desc:'Wallet y comisiones de referidos',path:'/partner.html'},
    {icon:'customer',name:'Customer 360',desc:'Ficha única del cliente',path:'/customer360.html'}],
  ADVISOR:[{icon:'sales',name:'Ir a ventas',desc:'Registrar una venta en menos de 2 minutos',path:'/sales.html',primary:true},
    {icon:'customer',name:'Customer 360',desc:'Ficha única del cliente',path:'/customer360.html'}],
  SUPERVISOR:[{icon:'sales',name:'Ir a ventas',desc:'Registrar una venta en menos de 2 minutos',path:'/sales.html',primary:true},
    {icon:'console',name:'Consola',desc:'Dashboard de métricas',path:'/console.html'},
    {icon:'customer',name:'Customer 360',desc:'Ficha única del cliente',path:'/customer360.html'}],
  TECHNICIAN:[{icon:'wifi',name:'Operaciones',desc:'Instalaciones y órdenes',path:'/sales.html'}],
  REFERIDOR:[{icon:'partner',name:'Partner',desc:'Wallet y comisiones',path:'/partner.html',primary:true}],
};
const apps=ROLE_APPS[role]||ROLE_APPS.ADVISOR;
function logout(){localStorage.removeItem('referix_user');window.location='/';}
document.getElementById('app').innerHTML=`
  <div class="card">
    <div class="logo">R</div>
    <h2>${user?.name||'Usuario'}</h2>
    <p class="sub">${role||'Sin rol'}</p>
    <div class="apps">${apps.map(a=>`
      <a href="${a.path}" class="app-btn${a.primary?' primary':''}" style="display:flex;align-items:center;gap:14px"><span class="icon" style="color:${a.primary?'#fff':'var(--primary)'}">${icon(a.icon, '', 24)}</span>
      <div style="flex:1"><div class="name" style="${a.primary?'color:#fff':''}">${a.name}</div><div class="desc" style="${a.primary?'color:rgba(255,255,255,.7)':''}">${a.desc}</div></div></a>
    `).join('')}</div>
    <div class="logout" onclick="logout()">Cerrar sesión (${user?.email||''})</div>
  </div>`;
</script>
</body>
</html>
