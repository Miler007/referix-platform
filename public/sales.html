// CERE v2 — Customer Experience Recommendation Engine
// ═══════════════════════════════════════════════════════════════════
class CEREv2 {
  // Demand weights per activity
  demandWeights={
    composition:{adult:5,child:3,teen:8,elderly:2},
    device:{smartphones:1.5,tablets:3,smartTvs:10,computers:12,laptops:10,consoles:15,ipCameras:8,alexaGoogleHome:2,decoders:5,wifiPrinters:3,otherIot:2},
    simultaneous:{smartphones:1.5,smartTvs:10,computers:12,laptops:10,consoles:15},
    streaming:{sd:5,hd:8,fullHd:12,k4:20},
    work:{vpn:8,videoCall:10},
    education:{student:8},
    gaming:{console:5,pc:8,latency:10},
    cameras:{perCamera:8,recording24h:10,cloudUpload:5},
    business:{employee:5,pos:10,invoicing:5,cameras:8,vpn:10,servers:15,wifi:8}
  };

  buildProfile(data){
    return{
      composition:data.composition||{adults:2,children:0,teens:0,elderly:0},
      devices:data.devices||{smartphones:2,tablets:0,smartTvs:1,computers:0,laptops:1,consoles:0,ipCameras:0,alexaGoogleHome:0,decoders:0,wifiPrinters:0,otherIot:0},
      simultaneous:data.simultaneous||{smartphones:2,smartTvs:1,computers:0,laptops:1,consoles:0},
      streaming:data.streaming||{netflix:true,disneyPlus:false,primeVideo:false,max:false,youtube:true,iptv:false,quality:'HD'},
      remoteWork:data.remoteWork||{people:0,usesVpn:false,videoCalls:false,platforms:[]},
      education:data.education||{virtualClasses:false,university:false,onlineCourses:false,students:0},
      gaming:data.gaming||{platforms:[],frequentGames:false,priorityLatency:false},
      cameras:data.cameras||{count:0,records24h:false,cloudUpload:false},
      business:data.business||{isBusiness:false,employees:0,hasPos:false,electronicInvoicing:false,cameras:false,vpn:false,servers:false,clientWifi:false},
      growth:data.growth||{moreTvs:false,cameras:false,remoteWork:false,homeBusiness:false,moreDevices:false},
      priority:data.priority||'ESTABILIDAD'
    };
  }

  calculateDemandScore(profile){
    let score=0;
    const c=profile.composition;
    score+=c.adults*this.demandWeights.composition.adult;
    score+=c.children*this.demandWeights.composition.child;
    score+=c.teens*this.demandWeights.composition.teen;
    score+=c.elderly*this.demandWeights.composition.elderly;
    Object.entries(profile.devices).forEach(([k,v])=>score+=v*(this.demandWeights.device[k]||1));
    Object.entries(profile.simultaneous).forEach(([k,v])=>score+=v*(this.demandWeights.simultaneous[k]||1));
    const q=profile.streaming.quality;
    const qScore=q==='4K'?20:q==='FULL_HD'?15:q==='HD'?10:5;
    if(profile.streaming.netflix||profile.streaming.disneyPlus||profile.streaming.primeVideo||profile.streaming.max)score+=qScore;
    if(profile.streaming.youtube)score+=5;
    if(profile.streaming.iptv)score+=8;
    score+=profile.remoteWork.people*12;
    if(profile.remoteWork.usesVpn)score+=8;
    if(profile.remoteWork.videoCalls)score+=10;
    score+=profile.education.students*8;
    score+=profile.gaming.platforms.length*8;
    if(profile.gaming.priorityLatency)score+=10;
    score+=profile.cameras.count*8;
    if(profile.cameras.records24h)score+=10*profile.cameras.count;
    if(profile.cameras.cloudUpload)score+=5*profile.cameras.count;
    if(profile.business.isBusiness){score+=profile.business.employees*5;if(profile.business.hasPos)score+=10;if(profile.business.electronicInvoicing)score+=5;if(profile.business.cameras)score+=8;if(profile.business.vpn)score+=10;if(profile.business.servers)score+=15;if(profile.business.clientWifi)score+=8;}
    let growthScore=0;
    if(profile.growth.moreTvs)growthScore+=15;
    if(profile.growth.cameras)growthScore+=20;
    if(profile.growth.remoteWork)growthScore+=15;
    if(profile.growth.homeBusiness)growthScore+=25;
    if(profile.growth.moreDevices)growthScore+=10;
    score+=growthScore*0.5;
    return Math.min(100,score);
  }

  demandLevel(score){if(score<=25)return'BAJA';if(score<=50)return'MEDIA';if(score<=75)return'ALTA';return'MUY_ALTA';}

  evaluatePlan(profile,plan){
    const demandScore=this.calculateDemandScore(profile);
    const speed=plan.download_speed||50;
    const margin=Math.max(0,Math.round((1-demandScore/100)*100));
    const safetyMargin=Math.round(((speed-demandScore)/speed)*100);
    const pct=Math.min(100,Math.round(demandScore));
    const usagePct=Math.min(100,Math.round((demandScore/speed)*100));
    const compatibility=Math.max(5,Math.min(100,100-usagePct+15));
    const risk=usagePct>=90?'MUY_ALTO':usagePct>=80?'ALTO':usagePct>=70?'MEDIO':usagePct>=50?'BAJO':'MUY_BAJO';
    const lifeYears=usagePct<=40?5:usagePct<=55?4:usagePct<=70?3:usagePct<=85?2:1;
    const recommended=margin>=25&&usagePct<=75&&risk!=='ALTO'&&risk!=='MUY_ALTO';
    const reasons=[];
    const warnings=[];
    const totalDevices=Object.values(profile.devices).reduce((a,b)=>a+b,0);
    const totalSimul=Object.values(profile.simultaneous).reduce((a,b)=>a+b,0);
    if(totalDevices>0)reasons.push(`${totalDevices} dispositivos en el hogar`);
    if(totalSimul>1)reasons.push(`${totalSimul} dispositivos simultáneos`);
    if(profile.streaming.quality==='4K')reasons.push('Streaming 4K');
    if(profile.remoteWork.people>0)reasons.push(`${profile.remoteWork.people} persona(s) en teletrabajo`);
    if(profile.cameras.count>0)reasons.push(`${profile.cameras.count} cámara(s) IP`);
    if(profile.gaming.platforms.length>0)reasons.push('Gaming online');
    if(profile.education.students>0)reasons.push(`${profile.education.students} estudiante(s)`);
    if(profile.growth.moreTvs||profile.growth.cameras||profile.growth.moreDevices)reasons.push('Plan con margen de crecimiento');
    if(!recommended)warnings.push(`Riesgo de soporte: ${risk}. Ocupación estimada: ${usagePct}%.`);
    if(usagePct<=30&&speed>=150)warnings.push('Un plan superior no aportará mejoras perceptibles para este perfil.');
    return{planId:plan.id,planName:plan.name,price:plan.price||0,downloadSpeed:speed,uploadSpeed:plan.upload_speed||speed,isSymmetric:!!plan.is_symmetric,technology:plan.technology_name||'',demandScore,compatibility,demandLevel:this.demandLevel(demandScore),supportRisk:risk,safetyMargin:usagePct,estimatedLifeYears:lifeYears,recommended,reasons,warnings};
  }

  recommend(profile,plans){
    const evaluated=plans.map(p=>this.evaluatePlan(profile,p));
    evaluated.sort((a,b)=>b.compatibility-a.compatibility);
    const recommended=evaluated.find(p=>p.recommended)||evaluated[0];
    const alternatives=evaluated.filter(p=>p.planId!==recommended.planId&&!p.warnings.some(w=>w.includes('Riesgo'))).slice(0,2);
    const riskBlocked=recommended.supportRisk==='ALTO'||recommended.supportRisk==='MUY_ALTO';
    const oversell=evaluated.find(p=>p.safetyMargin<=30&&p.downloadSpeed>=150);
    const oversellWarning=oversell&&recommended.downloadSpeed<150?null:oversell?'Un plan superior no aportará mejoras perceptibles para este perfil.':null;
    const explanation=this.explain(profile,recommended);
    const blockReason=riskBlocked?`Riesgo de soporte ${recommended.supportRisk}. Se requiere autorización.`:null;
    return{recommended,alternatives,oversellWarning,explanation,riskBlocked,blockReason};
  }

  explain(profile,plan){
    const parts=[];
    const totalDevices=Object.values(profile.devices).reduce((a,b)=>a+b,0);
    const totalSimul=Object.values(profile.simultaneous).reduce((a,b)=>a+b,0);
    if(totalDevices>0)parts.push(`${totalDevices} dispositivos en el hogar`);
    if(totalSimul>1)parts.push(`${totalSimul} dispositivos simultáneos`);
    const activities=[];
    if(profile.streaming.netflix||profile.streaming.disneyPlus||profile.streaming.primeVideo)activities.push(`Streaming ${profile.streaming.quality}`);
    if(profile.remoteWork.people>0)activities.push('teletrabajo');
    if(profile.cameras.count>0)activities.push(`${profile.cameras.count} cámara(s) IP`);
    if(profile.gaming.platforms.length>0)activities.push('gaming');
    if(profile.education.students>0)activities.push('educación virtual');
    if(activities.length>0)parts.push(activities.join(', '));
    const lines=[`• ${parts.join('\n  • ')}`];
    lines.push(`Compatibilidad: ${plan.compatibility}%`);
    lines.push(`Riesgo de soporte: ${plan.supportRisk}`);
    lines.push(`Margen disponible: ${plan.safetyMargin}%`);
    lines.push(`Vida útil estimada: ${plan.estimatedLifeYears} años`);
    return `Recomendamos ${plan.planName} porque encontramos:\n${lines.join('\n')}`;
  }
}

let selectedZone=null,coverResult=null;
function initCoverage(){selectedZone=null;coverResult=null;view='coverage';render();}
function selectCoverageZone(id,name){selectedZone={id,name};coverResult=null;view='coverage';render();}
async function checkCoverage(){
  const addr=document.getElementById('cov-addr')?.value||'';
  if(!addr||!selectedZone) return;
  coverResult={loading:true};view='coverage';render();
  // Simulate coverage check
  const techs=zoneData.filter(z=>z.name===selectedZone.name);
  setTimeout(()=>{
    coverResult={available:true,technology:techs[0]?.technology_code||'GPON',technologyName:techs[0]?.technology||'Fibra Óptica',zoneName:selectedZone.name};
    view='coverage';render();
  },800);
}
function continueToProfile(){
  view='profile';render();
}
function continueToPlans(){
  const techId=zoneData.find(z=>z.name===selectedZone?.name)?.technology_id;
  loadPlans(selectedZone.id,techId);
}

  const steps=['Zona','Dirección','Cobertura','Plan'];

  return `<div class="p-5 slide-in">

      <div class="grid grid-cols-2 gap-2">${zoneList.map(z=>`<button onclick="selectCoverageZone('${z.zone_id}','${z.name}')" class="rounded-xl border-2 py-3 text-sm text-center transition-all ${selectedZone?.name===z.name?'border-primary-500 bg-primary-50 text-primary-700 font-medium':'border-neutral-200 hover:border-primary-300'}">📍 ${z.name}</button>`).join('')}

async function loadPlans(zoneId,techId){
  const p=await API.get(`/api/v2/catalog/plans?zone_id=${zoneId}&technology_id=${techId}`);
  if(p)plans=p;
  selectedPlan=null;view='plans';render();
}

function selectPlan(plan){
  selectedPlan=plan;
  setTimeout(()=>{if(view==='form'||view==='docs'||view==='confirm')return;selectedPlan=null;render();},1200000);
  view='form';render();
}

    <div class="space-y-3">${docsList.map(d=>`<label class="flex items-center gap-3 rounded-xl border-2 border-neutral-200 p-4 cursor-pointer hover:border-primary-300"><input type="checkbox" onchange="toggleDoc('${d}')" class="w-5 h-5 accent-primary-500"><span class="text-sm">${d}</span></label>`).join('')}
    </div>
    <button onclick="view='confirm';render()" class="w-full mt-6 rounded-xl bg-primary-500 text-white py-3.5 font-semibold hover:bg-primary-600">Revisar venta →</button>
  </div>`;
}
function toggleDoc(d){docs[d]=!docs[d];}

// ═══════════════════════════════════════════════════════════════════
// CONFIRM - Summary card
// ═══════════════════════════════════════════════════════════════════
function renderConfirm(){
  const price=selectedPlan?.price||0,commission=Math.round(price*0.10),iva=clientType==='COMMERCIAL'?Math.round(price*0.19):0;
  return `<div class="p-5 slide-in">
    <button onclick="view='docs';render()" class="text-primary-500 text-sm mb-4">← Documentos</button>
    <h2 class="text-lg font-bold mb-4">Confirmar venta</h2>
    <div class="rounded-xl bg-white border-2 border-neutral-200 p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-lg">${selectedPlan?.name}</h3>
        <span class="text-[10px] bg-primary-100 text-primary-700 px-2 py-0.5 rounded-full">${coverResult?.zoneName||''}</span>
      </div>
      <div class="space-y-2 text-sm border-b pb-3 mb-3">
        <div class="flex justify-between"><span class="text-neutral-500">Cliente</span><span class="font-medium">${form.name}</span></div>
        <div class="flex justify-between"><span class="text-neutral-500">Teléfono</span><span>${form.phone}</span></div>
        ${form.doc?`<div class="flex justify-between"><span class="text-neutral-500">Documento</span><span>${form.doc}</span></div>`:''}
        ${form.address?`<div class="flex justify-between"><span class="text-neutral-500">Dirección</span><span class="text-right text-xs">${form.address}</span></div>`:''}
        <div class="flex justify-between"><span class="text-neutral-500">Tipo</span><span>${clientType==='RESIDENTIAL'?'Residencial':'Comercial'}</span></div>
      </div>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-neutral-500">Plan</span><span class="font-semibold">${selectedPlan?.name}</span></div>
        <div class="flex justify-between"><span class="text-neutral-500">Precio</span><span class="font-semibold">$${price.toLocaleString('es-CO')}/mes</span></div>
        ${iva>0?`<div class="flex justify-between"><span class="text-neutral-500">IVA 19%</span><span>$${iva.toLocaleString('es-CO')}</span></div>`:''}
        <div class="flex justify-between"><span class="text-neutral-500">Instalación</span><span>2-3 días hábiles</span></div>
        <div class="h-px bg-neutral-100 my-2"></div>
        <div class="flex justify-between text-success-600 font-semibold"><span>💰 Comisión estimada</span><span>$${commission.toLocaleString('es-CO')}</span></div>
      </div>
    </div>
    <button onclick="submitSale()" class="w-full rounded-xl bg-success-500 text-white py-4 text-lg font-semibold hover:bg-success-600">✅ Registrar venta</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════════
async function submitSale(){
  const ref=await API.post('/api/v1/referrals',{fullName:form.name,phone:form.phone,email:form.email||'',address:form.address||'',planId:selectedPlan?.id,source:'SALES_APP'});
  if(ref){salesCount++;estimatedCommission+=Math.round((selectedPlan?.price||0)*0.10);view='success';render();}
  else alert('Error al registrar. Intenta de nuevo.');
}

function renderSuccess(){
  const price=selectedPlan?.price||0,commission=Math.round(price*0.10);
  return `<div class="p-5 text-center pt-16 slide-in">
    <div class="text-6xl mb-4">🎉</div>
    <h2 class="text-xl font-bold mb-2">¡Venta registrada!</h2>
    <p class="text-neutral-500 mb-6">La venta fue registrada exitosamente</p>
    <div class="rounded-xl bg-success-50 border p-4 mb-6 text-left">
      <p class="font-semibold text-success-800 mb-2">${selectedPlan?.name}</p>
      <div class="text-sm text-success-700 space-y-1">
        <p>📍 ${coverResult?.zoneName||''}</p>
        <p>👤 ${form.name}</p>
        <p>💰 Comisión: $${commission.toLocaleString('es-CO')}</p>
        <p>📋 Pendiente: validación de documentos</p>
      </div>
    </div>
    <div class="flex gap-3">
      <button onclick="initCoverage()" class="flex-1 rounded-xl bg-primary-500 text-white py-3.5 font-semibold hover:bg-primary-600">Nueva venta</button>
      <button onclick="view='dashboard';render()" class="flex-1 rounded-xl border-2 border-neutral-300 py-3.5 font-medium">Ir al inicio</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// CLIENT SEARCH
// ═══════════════════════════════════════════════════════════════════
function renderClientSearch(){
  return `<div class="p-5 slide-in">
    <button onclick="view='dashboard';render()" class="text-primary-500 text-sm mb-4">← Volver</button>
    <h2 class="text-lg font-bold mb-4">Buscar cliente</h2>
    <input id="search-q" placeholder="Nombre, teléfono o documento..." class="w-full rounded-xl border border-neutral-300 px-4 py-3 text-sm mb-4" oninput="searchClients()">
    <div id="search-results" class="text-sm text-neutral-500 text-center py-8">Escribe para buscar clientes existentes</div>
  </div>`;
}
</script>
</body>
</html>
