<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Referix — Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#0066FF;--primary-dark:#0047B3;--success:#059669;--warning:#D97706;--danger:#DC2626;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--transition:all .25s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;touch-action:manipulation;font-feature-settings:'cv02','cv03','cv04','cv11'}
::selection{background:var(--primary);color:#fff}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;position:relative;overflow-x:hidden;box-shadow:0 0 60px rgba(0,0,0,.04)}
button,.btn,input,select{min-height:44px}
input,select{font-size:16px!important}
/* ── Spacing ── */
.px-5{padding-left:24px;padding-right:24px}.py-4{padding-top:16px;padding-bottom:16px}.py-6{padding-top:28px;padding-bottom:28px}.py-10{padding-top:40px;padding-bottom:40px}.pb-20{padding-bottom:80px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mt-4{margin-top:16px}
/* ── Typography ── */
.text-xs{font-size:12px;line-height:1.4;color:var(--gray-400)}.text-sm{font-size:14px;line-height:1.5;color:var(--gray-500)}
.text-lg{font-size:18px;font-weight:700;color:var(--gray-900);line-height:1.3;letter-spacing:-.3px}.text-xl{font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-.3px}
.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
.text-center{text-align:center}.text-right{text-align:right}.flex{display:flex}.flex-col{flex-direction:column}
.items-start{align-items:flex-start}.items-center{align-items:center}.justify-center{justify-content:center}
.justify-between{justify-content:space-between}.flex-1{flex:1}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.grid{display:grid}.grid-cols-2{grid-template-columns:1fr 1fr}
/* ── Colors ── */
.primary{color:var(--primary)}.success{color:var(--success)}.warning{color:var(--warning)}.muted{color:var(--gray-400)}.subtle{color:var(--gray-500)}
/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:var(--transition);letter-spacing:-.2px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px rgba(0,102,255,.2)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(0,102,255,.3);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--success),#047857);color:#fff;box-shadow:0 4px 16px rgba(5,150,105,.2)}
.btn-ghost{background:transparent;color:var(--primary);padding:8px;border-radius:8px;transition:var(--transition)}
.btn-ghost:hover{background:var(--gray-50)}
.btn-outline{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200)}.btn-outline:hover{background:var(--gray-50);border-color:var(--gray-300)}
/* ── Cards ── */
.card{background:#fff;border:1px solid var(--gray-100);border-radius:16px;padding:20px;transition:var(--transition);cursor:pointer;box-shadow:var(--shadow)}
.card:hover{border-color:var(--gray-200);box-shadow:var(--shadow-lg)}
.card:active{transform:scale(.99)}
.card-selected{border-color:var(--primary);background:#F5F9FF;box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;gap:4px}
.badge-gpon{background:var(--primary-light, #EFF6FF);color:var(--primary)}.badge-tv{background:#FEF3C7;color:var(--warning)}
.badge-sym{background:#ECFDF5;color:var(--success)}.badge-cere{background:#F3E8FF;color:#9333EA}
/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-fadeUp{animation:fadeUp .35s ease-out both}.animate-fadeIn{animation:fadeIn .25s ease-out both}
.animate-pulse{animation:pulse 2s ease-in-out infinite}
.delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}
/* ── Inputs ── */
input,select{width:100%;padding:14px 16px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:var(--transition);background:#fff}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
input::placeholder{color:var(--gray-400)}
/* ── Misc ── */
.shadow-sm{box-shadow:var(--shadow)}.shadow-md{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.divider{border:none;border-top:1px solid var(--gray-100);margin:16px 0}
.rounded-full{border-radius:999px}.rounded-xl{border-radius:14px}
.w-full{width:100%}.block{display:block}.hidden{display:none}
html{scroll-behavior:smooth}
.svg-icon svg{width:100%;height:100%}
.check-card{display:flex;align-items:center;gap:12px;padding:16px;border:1.5px solid var(--gray-200);border-radius:12px;cursor:pointer;transition:var(--transition);margin-bottom:8px}
.check-card:hover{border-color:var(--gray-300)}.check-card.active{border-color:var(--primary);background:#F5F9FF}
.check-card .check{width:22px;height:22px;border:2px solid var(--gray-300);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:var(--transition);flex-shrink:0}.check-card.active .check{background:var(--primary);border-color:var(--primary);color:#fff}
/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>

<script src="/icons.js"></script>
<script>
// ─── API ──────────────────────────────────────────────────────────
const _user=JSON.parse(localStorage.getItem('referix_user')||'{}');
function apiFetch(url,opts,timeout=6000){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),timeout);
  return fetch(url,{...opts,signal:ctrl.signal}).then(r=>{clearTimeout(t);return r;}).catch(()=>null);
}
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay','X-User-Id':_user.id||''},
  async get(p){try{const r=await apiFetch(this.base+p,{headers:this.headers,method:'GET'});if(!r||!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async post(p,b){try{const r=await apiFetch(this.base+p,{headers:this.headers,method:'POST',body:JSON.stringify(b)});if(!r||!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async del(p){try{const r=await apiFetch(this.base+p,{headers:this.headers,method:'DELETE'});if(!r||!r.ok)return null;return(await r.json()).data}catch(e){return null}}};

// ─── State ────────────────────────────────────────────────────────
let step='dashboard',zoneData=[],zoneList=[],plans=[],selectedPlan=null,selectedZone=null,coverResult=null;
let clientType='RESIDENTIAL',formData={},docData={},userName=_user.name||'Carlos',userRole=_user.role||'ADVISOR',userId=_user.id||'user-admin',userSales=0,userComm=0;
let dashData={salesToday:0,installationsPending:0,commissionsHeld:{count:0,total:0},recentActivity:[],myClients:[]};
let searchResults=[],searchTimer=null;;

// ─── Init ─────────────────────────────────────────────────────────
async function init(){
  zoneData=await API.get('/api/v2/catalog/zones')||[];
  zoneList=[...new Map(zoneData.map(z=>[z.name,z])).values()];
  await loadDash();
}
init();

// ─── Router ──────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('app');
  const views={dashboard:()=>renderDashboard(),coverage:()=>renderCoverage(),plans:async()=>{el.innerHTML='<div class="px-5 py-6"><p class="text-xs muted">Cargando planes...</p></div>';el.innerHTML=await renderPlans();},form:()=>renderForm(),docs:()=>renderDocs(),confirm:()=>renderConfirm(),success:()=>renderSuccess(),opportunity:()=>renderOpportunity(),commissions:async()=>{el.innerHTML='<div class="px-5 py-6"><p class="text-xs muted">Cargando comisiones...</p></div>';el.innerHTML=await renderCommissionsView();}};
  const viewFn=views[step]||renderDashboard;
  const result=viewFn();
  if(result instanceof Promise)result.then(function(html){if(html)el.innerHTML=html;});
  else el.innerHTML=result;
}
function go(s){step=s;render();}
function getComm(p){return Math.round((p||0)*0.5);}

// ─── DASHBOARD ──────────────────────────────────────────────────
async function loadDash(){
  const d=await API.get('/api/v1/dashboard');
  if(d){dashData={salesToday:d.salesToday||0,installationsPending:d.installationsPending||0,commissionsHeld:d.commissionsHeld||{count:0,total:0},recentActivity:(d.recentActivity||[]).slice(0,6),myClients:[]};}
  const clients=await API.get('/api/v1/referrals?limit=5');
  if(clients&&clients.length)dashData.myClients=clients;
  render();
}
function searchClients(q){
  clearTimeout(searchTimer);
  const el=document.getElementById('search-results');
  if(!q||q.length<2){searchResults=[];if(el){el.innerHTML='';el.style.display='none';}return;}
  searchTimer=setTimeout(async function(){
    const r=await API.get('/api/v1/clients/search?q='+encodeURIComponent(q));
    searchResults=r||[];
    if(!el)return;
    el.style.display='block';
    if(searchResults.length===0){el.innerHTML='<div style="padding:12px;font-size:13px;color:#9CA3AF;text-align:center">Sin resultados</div>';return;}
    el.innerHTML=searchResults.map(c=>'<div style="padding:10px 12px;border-bottom:1px solid #F3F4F6;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="window.location=\'/customer360.html?id='+c.id+'\'"><div style="width:32px;height:32px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0066FF">'+(c.full_name||'?')[0]+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+(c.full_name||'')+'</div><div style="font-size:11px;color:#9CA3AF">'+(c.phone||c.email||'')+'</div></div><span style="font-size:10px;font-weight:500;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:999px">'+(c.funnel_status||'')+'</span></div>').join('');
  },250);
}
function renderDashboard(){
  const hora=new Date().getHours();
  const saludo=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  const {salesToday,installationsPending,commissionsHeld,recentActivity,myClients}=dashData;
  const totalEarned=commissionsHeld.total||0;
  const pendingCount=myClients.filter(c=>c.funnel_status==='NEW'||c.funnel_status==='CONTACTED').length;
  return `<div class="px-5 py-6 animate-fadeUp">
    <!-- Header -->
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0066FF,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 4px 16px rgba(0,102,255,.2)">${userName[0]}</div>
      <div><p style="font-size:19px;font-weight:700;letter-spacing:-.3px">${saludo}, ${userName}</p><p style="font-size:12px;color:var(--gray-400)">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})}</p></div>
    </div>

    <!-- Search bar -->
    <div style="position:relative;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:14px;padding:0 14px;transition:all .2s" id="search-wrapper">
        <span style="color:var(--gray-400);flex-shrink:0">${icn('search',16)}</span>
        <input type="text" id="search-input" placeholder="Buscar cliente por nombre, teléfono o email..." oninput="searchClients(this.value)" style="border:none;background:transparent;padding:14px 8px;font-size:14px;outline:none;width:100%">
      </div>
      <div id="search-results" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--gray-200);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.1);z-index:100;max-height:280px;overflow-y:auto;display:none"></div>
    </div>

    <!-- Hero CTA -->
    <button class="btn" onclick="go('coverage')" style="background:linear-gradient(135deg,#0066FF,#003DA6);color:#fff;font-size:20px;font-weight:700;padding:20px;border-radius:16px;box-shadow:0 8px 32px rgba(0,102,255,.25);letter-spacing:-.3px;margin-bottom:16px">
      <span style="display:flex;align-items:center;gap:10px">${icn('customer',22)} Atender cliente nuevo</span>
    </button>

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px">
      <div style="background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-radius:12px;padding:12px 8px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:2px">${icn('trendingUp',12)}<span style="font-size:8px;color:#059669;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Ventas</span></div>
        <p style="font-size:20px;font-weight:800;color:#059669;letter-spacing:-.5px">${salesToday}</p>
      </div>
      <div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:12px;padding:12px 8px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:2px">${icn('money',12)}<span style="font-size:8px;color:#0066FF;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Comisiones</span></div>
        <p style="font-size:20px;font-weight:800;color:#0066FF;letter-spacing:-.5px">$${Math.round(totalEarned).toLocaleString('es-CO')}</p>
      </div>
      <div style="background:linear-gradient(135deg,#FFFBEB,#FDE68A);border-radius:12px;padding:12px 8px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:2px">${icn('clock',12)}<span style="font-size:8px;color:#D97706;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Pendientes</span></div>
        <p style="font-size:20px;font-weight:800;color:#D97706;letter-spacing:-.5px">${pendingCount}</p>
      </div>
    </div>

    <!-- Mis clientes -->
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:24px;height:24px;border-radius:6px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;color:var(--primary)">${icon('users','',16)}</div>
          <span style="font-size:13px;font-weight:600;color:var(--gray-800);letter-spacing:-.2px">Mis clientes</span>
        </div>
        <span onclick="loadMoreClients()" style="font-size:11px;color:var(--primary);font-weight:500;cursor:pointer">Ver todos →</span>
      </div>
      ${myClients.length===0?'<div style="padding:24px 16px;background:var(--gray-50);border-radius:12px;text-align:center;font-size:12px;color:var(--gray-400)"><div style="margin-bottom:8px">'+icon('users','',24)+'</div>Aún no tienes clientes</div>':
      myClients.map(c=>{
        const initial=(c.full_name||'?')[0];
        const isNew=c.funnel_status==='NEW';
        return '<div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--gray-100);border-radius:12px;padding:12px;margin-bottom:6px;cursor:pointer;transition:var(--transition)" onclick="window.location=\'/customer360.html?id='+c.id+'" onmouseover="this.style.borderColor=\'var(--primary)\'" onmouseout="this.style.borderColor=\'var(--gray-100)\'"><div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary);flex-shrink:0">'+initial+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--gray-800)">'+(c.full_name||'')+'</div><div style="font-size:10px;color:var(--gray-400);margin-top:1px">'+((c.phone?'📱 '+c.phone:'')||c.email||'')+'</div></div><span style="font-size:9px;font-weight:600;color:'+(isNew?'var(--warning)':'var(--success)')+';background:'+(isNew?'#FFFBEB':'#ECFDF5')+';padding:2px 8px;border-radius:999px">'+(c.funnel_status||'')+'</span></div>';
      }).join('')}
    </div>

    <!-- Insight card -->
    <div style="background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:rgba(5,150,105,.12);display:flex;align-items:center;justify-content:center;color:#059669;flex-shrink:0">${icon('lightbulb','',16)}</div>
      <div><p style="font-size:11px;font-weight:600;color:#065F46">Inteligencia Comercial</p><p style="font-size:10px;color:#047857;margin-top:2px;line-height:1.4">MegaUltra 100 creció <strong>18%</strong> en Fresno. El <strong>72%</strong> de familias de 4 personas eligen este plan.</p></div>
    </div>

    <!-- Activity card -->
    <div style="background:#fff;border:1px solid var(--gray-100);border-radius:12px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div style="width:22px;height:22px;border-radius:6px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;color:var(--primary)">${icon('bolt','',14)}</div>
        <span style="font-size:11px;font-weight:600;color:var(--gray-800)">Actividad reciente</span>
        <span style="margin-left:auto;font-size:9px;color:var(--gray-400)">${recentActivity.length} eventos</span>
      </div>
      ${recentActivity.length===0?'<div style="padding:4px 0;font-size:11px;color:var(--gray-400)">Sin actividad registrada hoy</div>':
      '<div>'+recentActivity.map(a=>{
        const t=a.time?new Date(a.time).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'';
        let label=a.event||'',ico=icon('pin','',10);
        try{const p=JSON.parse(a.payload||'{}');
          if(a.event==='COMMISSION_CREATED'){label=(p.planName||'')+' · '+(p.clientName||'');ico=icon('money','',10);}
          else if(a.event==='INVOICE_PAID'){label='Factura pagada';ico=icon('check','',10);}
          else if(a.event==='COMMISSION_PAID'){label='Comisión pagada';ico=icon('card','',10);}
        }catch(e){}
        return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--gray-50)"><span style="font-size:8px;color:var(--gray-400);width:28px;flex-shrink:0;font-variant-numeric:tabular-nums">'+t+'</span><span style="width:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+ico+'</span><span style="font-size:10px;color:var(--gray-600)">'+label+'</span></div>';
      }).join('')+'</div>'}
    </div>

    <!-- CERE card -->
    <div style="background:linear-gradient(135deg,#F3E8FF,#EDE9FE);border-radius:12px;padding:14px 16px;margin-bottom:16px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="go('coverage')">
      <div style="width:32px;height:32px;border-radius:8px;background:rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;color:#7C3AED;flex-shrink:0">${icon('brain','',16)}</div>
      <div><p style="font-size:11px;font-weight:600;color:#5B21B6">Recomendación CERE</p><p style="font-size:10px;color:#6D28D9;margin-top:1px">Responde 3 preguntas y encuentra el plan perfecto</p></div>
    </div>

    <!-- Quick Actions -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn" onclick="go('coverage')" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:14px;font-size:13px;font-weight:600;border-radius:12px;box-shadow:0 4px 12px rgba(0,102,255,.15)">${icn('customer',14)} Nueva venta</button>
      <button class="btn" onclick="go('commissions')" style="background:#fff;color:var(--gray-700);padding:14px;font-size:13px;font-weight:600;border-radius:12px;border:1px solid var(--gray-200)">${icn('money',14)} Mis comisiones</button>
    </div>
  </div>`;
}
async function loadMoreClients(){
  const r=await API.get('/api/v1/referrals?limit=50');
  if(r&&r.length){dashData.myClients=r;render();}
}

// ─── COMMISSIONS VIEW ──────────────────────────────────────────
async function renderCommissionsView(){
  const data=await API.get('/api/v1/commissions/my-commissions');

}

// ─── COMPARADOR ──────────────────────────────────────────────────
let comparadorActivo=null;
function toggleComparador(idx){
  if(comparadorActivo===idx){comparadorActivo=null;render();return;}
  comparadorActivo=idx;render();
}
function renderComparador(display,baseIdx){
  const base=display[baseIdx];
  if(!base)return'';
  const otros=display.filter(function(p,i){return i!==baseIdx;}).slice(0,2);
  function fila(label,valBase,val1,val2){
    return `<tr><td style="font-size:11px;color:#6B7280;padding:6px 8px;border-bottom:1px solid #F3F4F6">${label}</td>
      <td style="font-size:12px;font-weight:600;padding:6px 8px;border-bottom:1px solid #F3F4F6;color:#0066FF">${valBase}</td>
      ${val1!==undefined?`<td style="font-size:12px;padding:6px 8px;border-bottom:1px solid #F3F4F6">${val1}</td>`:''}
      ${val2!==undefined?`<td style="font-size:12px;padding:6px 8px;border-bottom:1px solid #F3F4F6">${val2}</td>`:''}</tr>`;
  }
  let ben=[];
  try{ben=JSON.parse(base.benefits||'[]');}catch(e){}
  const hasBaseTv=ben.some(function(b){return b.toLowerCase().includes('tv');});
  return `<div style="background:#fff;border:1px solid #0066FF;border-radius:12px;padding:12px;margin-bottom:16px;overflow-x:auto">
    <p style="font-size:13px;font-weight:600;margin-bottom:8px">📊 Comparar planes</p>
    <table style="width:100%;border-collapse:collapse">
      ${fila('','🔵 '+base.name,otros[0]?.name,otros[1]?.name)}
      ${fila('Precio','$'+base.price.toLocaleString('es-CO'),otros[0]?'$'+otros[0].price.toLocaleString('es-CO'):'-',otros[1]?'$'+otros[1].price.toLocaleString('es-CO'):'-')}
      ${fila('Velocidad',base.download_speed+' Mbps',otros[0]?otros[0].download_speed+' Mbps':'-',otros[1]?otros[1].download_speed+' Mbps':'-')}
      ${fila('TV',hasBaseTv?icn('check',14)+' Sí':'❌ No',otros[0]?(()=>{try{return JSON.parse(otros[0].benefits||'[]').some(function(b){return b.toLowerCase().includes('tv');})?icn('check',14)+' Sí':'❌ No'}catch(e){return '❌ No'}})():'-',otros[1]?(()=>{try{return JSON.parse(otros[1].benefits||'[]').some(function(b){return b.toLowerCase().includes('tv');})?icn('check',14)+' Sí':'❌ No'}catch(e){return '❌ No'}})():'-')}
      ${fila('Instalación',(base.installation_cost||0)===0?icn('check',14)+' Gratis':'$'+((base.installation_cost||0)).toLocaleString('es-CO'),otros[0]?((otros[0].installation_cost||0)===0?icn('check',14)+' Gratis':'$'+((otros[0].installation_cost||0)).toLocaleString('es-CO')):'-',otros[1]?((otros[1].installation_cost||0)===0?icn('check',14)+' Gratis':'$'+((otros[1].installation_cost||0)).toLocaleString('es-CO')):'-')}
    </table>
  </div>`;
}

function resetAll(){selectedPlan=null;selectedZone=null;formData={};docData={};go('coverage');}

// ── OPPORTUNITY ──────────────────────────────────────────────────
function renderOpportunity(){
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('dashboard')">${icn('back',14)} Volver</button>
    <p class="text-lg mb-2">Registrar oportunidad</p>
    <p class="text-sm muted mb-6">El cliente no compró hoy. ¿Cuál fue el motivo?</p>
    <div class="grid grid-cols-2 gap-2 mb-6">${['Precio','Comparando','Lo pensará','Sin documentos','Sin cobertura','Esperando pago','Hablar con familia','Otro'].map(function(m){return`<div class="card" onclick="selectedReason='${m}';render()" style="text-align:center;padding:14px;border-color:${selectedReason===m?'#0066FF':'#F0F0F0'}">${m}</div>`;}).join('')}</div>
    <button class="btn btn-success" onclick="resetAll()">${icn('check',14)} Registrar</button>
  </div>`;
}
let selectedReason='';
</script>
