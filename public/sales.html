<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Referix — Ventas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F8F9FA;color:#111827;line-height:1.5;touch-action:manipulation}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:#FFFFFF;position:relative;overflow-x:hidden}
/* Touch targets mínimos 44px */
button,.btn,input,select{min-height:44px}
input,select{font-size:16px!important} /* Evita zoom en iOS */
/* ── Spacing ── */
.px-5{padding-left:20px;padding-right:20px}.py-4{padding-top:16px;padding-bottom:16px}.py-6{padding-top:24px;padding-bottom:24px}.py-10{padding-top:40px;padding-bottom:40px}.pb-20{padding-bottom:80px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-auto{margin-top:auto}
/* ── Typography ── */
.text-xs{font-size:12px;line-height:1.4;color:#6B7280}.text-sm{font-size:14px;line-height:1.5;color:#6B7280}
.text-lg{font-size:18px;font-weight:700;color:#111827;line-height:1.3}.text-xl{font-size:22px;font-weight:700;line-height:1.3}
.text-2xl{font-size:28px;font-weight:800;line-height:1.2}.text-3xl{font-size:34px;font-weight:800;line-height:1.1}
.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
.text-center{text-align:center}.text-right{text-align:right}.flex{display:flex}.flex-col{flex-direction:column}
.items-start{align-items:flex-start}.items-center{align-items:center}.justify-center{justify-content:center}
.justify-between{justify-content:space-between}.flex-1{flex:1}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.grid{display:grid}.grid-cols-2{grid-template-columns:1fr 1fr}.grid-cols-3{grid-template-columns:1fr 1fr 1fr}
/* ── Colors ── */
.primary{color:#0066FF}.primary-bg{background:#0066FF;color:#fff}
.success{color:#059669}.success-bg{background:#059669;color:#fff}
.warning{color:#D97706}.muted{color:#9CA3AF}.subtle{color:#6B7280}
.bg-subtle{background:#F3F4F6}.bg-surface{background:#fff}.bg-premium{background:linear-gradient(135deg,#0066FF,#0052CC)}
/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#0066FF;color:#fff}.btn-primary:hover{background:#0052CC}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-ghost{background:transparent;color:#0066FF;padding:8px}.btn-ghost:hover{background:#F3F4F6}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #E5E7EB}.btn-outline:hover{background:#F9FAFB}
/* ── Cards ── */
.card{background:#fff;border:1px solid #F0F0F0;border-radius:16px;padding:20px;transition:all .2s;cursor:pointer}
.card:hover{border-color:#D1D5DB;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.card:active{transform:scale(0.99)}
.card-selected{border-color:#0066FF;background:#F5F9FF;box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;gap:4px}
.badge-gpon{background:#EFF6FF;color:#0066FF}.badge-tv{background:#FEF3C7;color:#D97706}
.badge-sym{background:#ECFDF5;color:#059669}.badge-cere{background:#F3E8FF;color:#9333EA}
/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.animate-fadeUp{animation:fadeUp .35s ease-out both}.animate-fadeIn{animation:fadeIn .25s ease-out both}
.animate-pulse{animation:pulse 2s ease-in-out infinite}
.delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}
/* ── Inputs ── */
input,select{width:100%;padding:14px 16px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:#fff}
input:focus{border-color:#0066FF;box-shadow:0 0 0 3px rgba(0,102,255,.1)}
input::placeholder{color:#9CA3AF}
/* ── Shadows ── */
.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.04)}.shadow-md{box-shadow:0 4px 16px rgba(0,0,0,.06)}
/* ── Divider ── */
.divider{border:none;border-top:1px solid #F0F0F0;margin:16px 0}
/* ── Misc ── */
.rounded-full{border-radius:999px}.rounded-xl{border-radius:14px}.rounded-2xl{border-radius:16px}
.w-full{width:100%}.h-full{height:100%}.block{display:block}.hidden{display:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
/* Scroll suave */
html{scroll-behavior:smooth}
/* Checkbox personalizado */
.check-card{display:flex;align-items:center;gap:12px;padding:16px;border:1.5px solid #E5E7EB;border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.check-card:hover{border-color:#D1D5DB}.check-card.active{border-color:#0066FF;background:#F5F9FF}
.check-card .check{width:22px;height:22px;border:2px solid #D1D5DB;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}.check-card.active .check{background:#0066FF;border-color:#0066FF;color:#fff}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── API ──────────────────────────────────────────────────────────
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay'},
  async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async post(p,b){try{const r=await fetch(this.base+p,{method:'POST',headers:this.headers,body:JSON.stringify(b)});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}}};

// ─── State ────────────────────────────────────────────────────────
let step='dashboard',zoneData=[],zoneList=[],plans=[],selectedPlan=null,selectedZone=null,coverResult=null;
let clientType='RESIDENTIAL',formData={},docData={},userName='Carlos',userSales=18,userGoal=25,userComm=132000;

// ─── Init ─────────────────────────────────────────────────────────
async function init(){
  zoneData=await API.get('/api/v2/catalog/zones')||[];
  zoneList=[...new Map(zoneData.map(z=>[z.name,z])).values()];
  render();
}
init();

// ─── Router ──────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('app');
  const views={dashboard:()=>renderDashboard(),coverage:()=>renderCoverage(),plans:async()=>{el.innerHTML='<div class="px-5 py-6"><p class="text-xs muted">Cargando planes...</p></div>';el.innerHTML=await renderPlans();},form:()=>renderForm(),docs:()=>renderDocs(),confirm:()=>renderConfirm(),success:()=>renderSuccess(),opportunity:()=>renderOpportunity()};
  const viewFn=views[step]||renderDashboard;
  const result=viewFn();
  if(result instanceof Promise)result.then(function(html){if(html)el.innerHTML=html;});
  else el.innerHTML=result;
}
function go(s){step=s;render();}
function getComm(p){return Math.round((p||0)*0.1);}

// ─── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard(){
  const hora=new Date().getHours();
  const saludo=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  const momento=hora<9?'temprano':hora<12?'media mañana':hora<14?'mediodía':hora<17?'tarde':'final de la tarde';
  const completado=Math.min(100,Math.round((userSales/userGoal)*70+15));
  const healthClients=[
    {name:'María Rodríguez',health:96,label:'Alta probabilidad',color:'#059669',bg:'#ECFDF5',action:'📞 Llamar',prio:'🔴'},
    {name:'Pedro Martínez',health:65,label:'Necesita seguimiento',color:'#D97706',bg:'#FFFBEB',action:'📋 Documentos',prio:'🟠'},
    {name:'Carlos Ruiz',health:30,label:'Riesgo de perder',color:'#DC2626',bg:'#FEF2F2',action:'📍 Visitar',prio:'🟡'},
  ];
  return `<div class="px-5 py-6 animate-fadeUp">
    <!-- Saludo según momento del día -->
    <div class="flex items-center gap-3 mb-4">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0066FF,#0052CC);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff">${userName[0]}</div>
      <div><p class="text-lg">${saludo}, ${userName}</p><p class="text-xs" style="color:#9CA3AF">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})} · ${hora<12?'🌤️ Mañana':hora<18?'☀️ Tarde':'🌙 Noche'}</p></div>
    </div>

    <!-- Agenda inteligente con prioridad -->
    <div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:14px;padding:20px;margin-bottom:16px">
      <p style="font-size:15px;color:#003DA6;font-weight:500">${momento==='temprano'?'Comienza tu jornada con energía 💪':momento==='media mañana'?'Sigue así, llevas buen ritmo 📈':momento==='mediodía'?'Buen ritmo, aprovecha la tarde 🚀':momento==='tarde'?'Aún hay tiempo para más ventas ⏳':'Antes de terminar, revisa estos seguimientos 📋'}</p>
      <p style="font-size:13px;color:#0052CC;margin-top:6px">Has completado el <strong>${completado}%</strong> de tu jornada · ${userSales} clientes conectados este mes</p>
    </div>

    <!-- Prioridad inteligente -->
    <div style="background:#fff;border:1px solid #F0F0F0;border-radius:14px;padding:16px;margin-bottom:16px">
      <p style="font-size:14px;font-weight:600;margin-bottom:10px">📋 Prioridades del día</p>
      ${healthClients.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer">
        <div style="width:36px;height:36px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:${c.color}">${c.name[0]}</div>
        <div style="flex:1"><p style="font-size:13px;font-weight:500">${c.name} <span style="font-size:10px;color:${c.color};font-weight:600">${c.prio} ${c.health}/100</span></p><p style="font-size:11px;color:#6B7280">${c.label}</p></div>
        <span style="font-size:12px;font-weight:500;color:#0066FF">${c.action}</span>
      </div>`).join('')}
    </div>

    <!-- Una acción principal -->
    <button class="btn btn-primary mb-4 shadow-md" onclick="go('coverage')" style="font-size:19px;padding:22px;border-radius:16px">🙋 Atender cliente</button>

    <!-- Center de Inteligencia Comercial -->
    <div style="background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-radius:14px;padding:14px;margin-bottom:16px">
      <p style="font-size:12px;font-weight:600;color:#059669">💡 Inteligencia Comercial</p>
      <p style="font-size:12px;color:#047857;margin-top:4px">Esta semana MegaUltra 100 creció 18% en Fresno. El 72% de familias de 4 personas eligen este plan.</p>
    </div>

    <!-- Timeline rápido -->
    <div style="background:#fff;border:1px solid #F0F0F0;border-radius:14px;padding:16px;margin-bottom:16px">
      <p style="font-size:14px;font-weight:600;margin-bottom:8px">⚡ Hoy</p>
      <div style="border-left:2px solid #E5E7EB;padding-left:12px;margin-left:4px">
        <div style="padding:6px 0"><span style="font-size:10px;color:#9CA3AF">09:12</span><p style="font-size:12px;margin-top:2px">María Rodríguez — Interesada en fibra 🏠</p></div>
        <div style="padding:6px 0"><span style="font-size:10px;color:#9CA3AF">09:18</span><p style="font-size:12px;margin-top:2px">CERE recomendó MegaUltra 100 ✅</p></div>
        <div style="padding:6px 0"><span style="font-size:10px;color:#9CA3AF">09:22</span><p style="font-size:12px;margin-top:2px">Cotización enviada 📄</p></div>
        <div style="padding:6px 0"><span style="font-size:10px;color:#9CA3AF">11:40</span><p style="font-size:12px;margin-top:2px">Cliente solicita tiempo 🕐</p></div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-2">
      <button class="btn btn-outline" onclick="go('coverage')" style="padding:14px;font-size:13px">🙋 Atender cliente</button>
      <button class="btn btn-outline" onclick="window.location='/customer360.html'" style="padding:14px;font-size:13px">👤 Buscar cliente</button>
    </div>
  </div>`;
}

// ─── COVERAGE ────────────────────────────────────────────────────
function renderCoverage(){
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('dashboard')">← Volver</button>
    <p class="text-lg mb-2">¿Dónde está el cliente?</p>
    <p class="text-sm mb-6">Elige el municipio para ver la cobertura disponible</p>
    <div class="grid grid-cols-2 gap-2 mb-6">${zoneList.map((z,i)=>`<div class="card animate-fadeUp delay-${(i%3)+1}" onclick="selectedZone={id:'${z.zone_id}',name:'${z.name}'};coverResult={available:true,msg:'Cobertura GPON disponible'};go('plans')" style="text-align:center;padding:16px;border-color:${selectedZone?.name===z.name?'#0066FF':'#F0F0F0'}">📍<br><span style="font-weight:600;font-size:13px">${z.name}</span></div>`).join('')}</div>
    ${selectedZone?`<p class="text-xs muted text-center">✅ Cobertura GPON disponible en ${selectedZone.name}</p>`:''}
  </div>`;
}

// ─── PLANS (Premium) ─────────────────────────────────────────────
function getPlanBadge(plan,idx){
  if(idx===0&&plans.length>1)return{text:'💰 Más económico',color:'bg:#ECFDF5;color:#059669',icon:'💰'};
  if(plan.download_speed>=200)return{text:'🚀 Mayor velocidad',color:'bg:#EFF6FF;color:#0066FF',icon:'🚀'};
  if(plan.download_speed>=100)return{text:'🔥 Más popular',color:'bg:#FEF3C7;color:#D97706',icon:'🔥'};
  if(plan.benefits&&plan.benefits.includes('TV'))return{text:'📺 TV incluida',color:'bg:#F3E8FF;color:#9333EA',icon:'📺'};
  return{text:'✅ Recomendado',color:'bg:#ECFDF5;color:#059669',icon:'✅'};
}
function selectPlan(idx){
  const display=getDisplayPlans();
  if(display[idx]){selectedPlan=display[idx];go('form');}
}
function getDisplayPlans(){
  return plans; // Solo los planes de la API, nunca fallback genérico
}
async function renderPlans(){
  if(selectedZone){
    const zoneTech=zoneData.filter(function(z){return z.zone_id===selectedZone.id||z.name===selectedZone.name;});
    const techId=zoneTech.length?zoneTech[0].technology_id:'tech-gpon';
    const fetched=await API.get(`/api/v2/catalog/plans?zone_id=${selectedZone.id}&technology_id=${techId}`);
    if(fetched&&fetched.length)plans=fetched; else plans=[];
  }
  const display=getDisplayPlans();
  const cmpIdx=comparadorActivo;
  if(!display||display.length===0){
    return `<div class="px-5 py-6 animate-fadeUp">
      <button class="btn-ghost mb-4" onclick="go('coverage')">← Municipios</button>
      <p class="text-lg mb-2">Planes en ${selectedZone?.name||''}</p>
      <p style="font-size:13px;color:#6B7280;margin-top:12px;padding:20px;background:#F9FAFB;border-radius:12px">📋 Catálogo pendiente de configurar para ${selectedZone?.name||'este municipio'}. Cuando INTERPLAY disponga de la información oficial, los planes aparecerán aquí.</p>
    </div>`;
  }
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('coverage')">← Municipios</button>
    <div class="flex items-center justify-between mb-1">
      <p class="text-lg">Planes en ${selectedZone?.name||'Fresno'}</p>
      <span class="text-xs muted">${coverResult?.technologyName||'GPON'}</span>
    </div>
    <p class="text-sm mb-6">${display.length} planes disponibles</p>

    ${cmpIdx!==undefined?renderComparador(display,cmpIdx):''}

    <div class="flex flex-col gap-4">${display.map(function(plan,idx){
      let ben=[];
      try{ben=JSON.parse(plan.benefits||'[]');}catch(e){}
      const hasTv=ben.some(function(b){return b.toLowerCase().includes('tv');});
      const instCost=plan.installation_cost||0;
      return `<div class="card animate-fadeUp" style="padding:20px;border:2px solid ${selectedPlan?.name===plan.name?'#0066FF':'#F0F0F0'}"
                onclick="selectPlan(${idx})">
        <!-- Encabezado -->
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="background:#EFF6FF;color:#0066FF;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600">🔵 ${coverResult?.technologyName||'GPON'}</span>
        </div>
        <div class="flex justify-between items-start mb-3">
          <div><p class="text-lg font-bold" style="color:#111827">${plan.name}</p>
            <p class="text-sm" style="color:#6B7280">${plan.download_speed} Mbps ${plan.is_symmetric?'Simétricos':''}</p></div>
          <div class="text-right"><p class="text-xl font-bold primary">$${(plan.price||0).toLocaleString('es-CO')}</p>
            <p class="text-xs muted">/mes</p></div>
        </div>

        <!-- Beneficios -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;font-size:13px">
          <span style="color:#059669">✅ Internet Fibra Óptica</span>
          <span style="color:#059669">✅ Router WiFi</span>
          <span style="color:#059669">✅ Instalación Internet ${instCost===0?'GRATIS':'$'+instCost.toLocaleString('es-CO')}</span>
          <span style="color:#059669">✅ Soporte INTERPLAY</span>
          <span style="color:#059669">✅ Sin cláusula de permanencia</span>
        </div>

        <!-- TV -->
        <div style="margin-bottom:12px;font-size:13px">
          ${hasTv
            ? '<span style="color:#059669">🟢 Incluye TV Digital HD</span>'
            : '<span style="color:#6B7280">📺 TV Digital HD disponible como adicional</span>'}
        </div>

        <!-- Ideal para -->
        <div style="margin-bottom:12px">
          <p style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Ideal para</p>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            <span style="background:#F3F4F6;padding:4px 10px;border-radius:6px;font-size:11px">👨‍👩‍👧 ${plan.recommended_users||'2-3 personas'}</span>
            <span style="background:#F3F4F6;padding:4px 10px;border-radius:6px;font-size:11px">📱 ${plan.recommended_devices||'Hasta 8 dispositivos'}</span>
            ${(plan.recommended_use||'').split(',').map(function(u){return '<span style="background:#F3F4F6;padding:4px 10px;border-radius:6px;font-size:11px">'+u.trim()+'</span>';}).join('')}
          </div>
        </div>

        <!-- Costos -->
        <div style="background:#F9FAFB;border-radius:10px;padding:12px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
            <span style="color:#6B7280">Plan mensual</span><span style="font-weight:600">$${(plan.price||0).toLocaleString('es-CO')}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
            <span style="color:#6B7280">Internet</span><span style="font-weight:600;color:#059669">${instCost===0?'Gratis':'$'+instCost.toLocaleString('es-CO')}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
            <span style="color:#6B7280">TV</span><span style="font-weight:600">${hasTv?'Incluida':'$'+ (plan.tv_installation_cost||30000).toLocaleString('es-CO')}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0">
            <span style="color:#6B7280">TV adicional</span><span style="font-weight:600">$${(plan.additional_tv_point||10000).toLocaleString('es-CO')}</span>
          </div>
        </div>

        <!-- Facturación -->
        <div style="background:#EFF6FF;border-radius:8px;padding:10px;margin-bottom:12px;font-size:11px;color:#0052CC">
          📋 Servicio mes vencido · Hoy instalas sin pagar · Facturación del 15 al 18 · Pago hasta el 30
        </div>

        <!-- Cobertura -->
        <div style="font-size:12px;color:#059669;margin-bottom:12px">
          📍 ${selectedZone?.name||''} · GPON disponible · ⏱ Instalación estimada 48 horas hábiles
        </div>

        <!-- CERE Recommendation (si aplica) -->
        <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:#166534">
          ⭐ Recomendación CERE · Ideal para este cliente · Cubre correctamente su necesidad
        </div>

        <!-- Botones -->
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="event.stopPropagation();selectPlan(${idx})" style="flex:1;font-size:15px;padding:14px">Elegir este plan</button>
          <button class="btn btn-outline" onclick="event.stopPropagation();toggleComparador(${idx})" style="padding:14px;font-size:13px">📊</button>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

// ─── COMPARADOR ──────────────────────────────────────────────────
let comparadorActivo=null;
function toggleComparador(idx){
  if(comparadorActivo===idx){comparadorActivo=null;render();return;}
  comparadorActivo=idx;render();
}
function renderComparador(display,baseIdx){
  const base=display[baseIdx];
  if(!base)return'';
  const otros=display.filter(function(p,i){return i!==baseIdx;}).slice(0,2);
  function fila(label,valBase,val1,val2){
    return `<tr><td style="font-size:11px;color:#6B7280;padding:6px 8px;border-bottom:1px solid #F3F4F6">${label}</td>
      <td style="font-size:12px;font-weight:600;padding:6px 8px;border-bottom:1px solid #F3F4F6;color:#0066FF">${valBase}</td>
      ${val1!==undefined?`<td style="font-size:12px;padding:6px 8px;border-bottom:1px solid #F3F4F6">${val1}</td>`:''}
      ${val2!==undefined?`<td style="font-size:12px;padding:6px 8px;border-bottom:1px solid #F3F4F6">${val2}</td>`:''}</tr>`;
  }
  let ben=[];
  try{ben=JSON.parse(base.benefits||'[]');}catch(e){}
  const hasBaseTv=ben.some(function(b){return b.toLowerCase().includes('tv');});
  return `<div style="background:#fff;border:1px solid #0066FF;border-radius:12px;padding:12px;margin-bottom:16px;overflow-x:auto">
    <p style="font-size:13px;font-weight:600;margin-bottom:8px">📊 Comparar planes</p>
    <table style="width:100%;border-collapse:collapse">
      ${fila('','🔵 '+base.name,otros[0]?.name,otros[1]?.name)}
      ${fila('Precio','$'+base.price.toLocaleString('es-CO'),otros[0]?'$'+otros[0].price.toLocaleString('es-CO'):'-',otros[1]?'$'+otros[1].price.toLocaleString('es-CO'):'-')}
      ${fila('Velocidad',base.download_speed+' Mbps',otros[0]?otros[0].download_speed+' Mbps':'-',otros[1]?otros[1].download_speed+' Mbps':'-')}
      ${fila('TV',hasBaseTv?'✅ Sí':'❌ No',otros[0]?(()=>{try{return JSON.parse(otros[0].benefits||'[]').some(function(b){return b.toLowerCase().includes('tv');})?'✅ Sí':'❌ No'}catch(e){return '❌ No'}})():'-',otros[1]?(()=>{try{return JSON.parse(otros[1].benefits||'[]').some(function(b){return b.toLowerCase().includes('tv');})?'✅ Sí':'❌ No'}catch(e){return '❌ No'}})():'-')}
      ${fila('Instalación',(base.installation_cost||0)===0?'✅ Gratis':'$'+((base.installation_cost||0)).toLocaleString('es-CO'),otros[0]?((otros[0].installation_cost||0)===0?'✅ Gratis':'$'+((otros[0].installation_cost||0)).toLocaleString('es-CO')):'-',otros[1]?((otros[1].installation_cost||0)===0?'✅ Gratis':'$'+((otros[1].installation_cost||0)).toLocaleString('es-CO')):'-')}
    </table>
  </div>`;
}

// ── CONFIRM ──────────────────────────────────────────────────────

        <div><p class="font-bold" style="font-size:17px">${selectedPlan.name}</p><p class="text-xs muted">${selectedZone?.name||'Fresno'} · GPON</p></div>

// ── SUBMIT ───────────────────────────────────────────────────────
async function submitSale(){
  // Intentar API, pero no esperar más de 3 segundos
  const promesa = API.post('/api/v1/referrals',{fullName:formData.name,phone:formData.phone,email:formData.email,address:formData.address,planId:selectedPlan?.id,source:'SALES_APP'});
  await Promise.race([promesa, new Promise(function(r){setTimeout(r,3000)})]);
  userSales++;userComm+=getComm(selectedPlan?.price||0);
  go('success');
}
