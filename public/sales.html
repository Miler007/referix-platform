<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Referix — Ventas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#F8F9FA;color:#111827;line-height:1.5}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:#FFFFFF;position:relative;overflow-x:hidden}
/* ── Spacing ── */
.px-5{padding-left:20px;padding-right:20px}.py-4{padding-top:16px;padding-bottom:16px}.py-6{padding-top:24px;padding-bottom:24px}.py-10{padding-top:40px;padding-bottom:40px}.pb-20{padding-bottom:80px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-auto{margin-top:auto}
/* ── Typography ── */
.text-xs{font-size:12px;line-height:1.4;color:#6B7280}.text-sm{font-size:14px;line-height:1.5;color:#6B7280}
.text-lg{font-size:18px;font-weight:700;color:#111827;line-height:1.3}.text-xl{font-size:22px;font-weight:700;line-height:1.3}
.text-2xl{font-size:28px;font-weight:800;line-height:1.2}.text-3xl{font-size:34px;font-weight:800;line-height:1.1}
.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}
.text-center{text-align:center}.text-right{text-align:right}.flex{display:flex}.flex-col{flex-direction:column}
.items-start{align-items:flex-start}.items-center{align-items:center}.justify-center{justify-content:center}
.justify-between{justify-content:space-between}.flex-1{flex:1}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.grid{display:grid}.grid-cols-2{grid-template-columns:1fr 1fr}.grid-cols-3{grid-template-columns:1fr 1fr 1fr}
/* ── Colors ── */
.primary{color:#0066FF}.primary-bg{background:#0066FF;color:#fff}
.success{color:#059669}.success-bg{background:#059669;color:#fff}
.warning{color:#D97706}.muted{color:#9CA3AF}.subtle{color:#6B7280}
.bg-subtle{background:#F3F4F6}.bg-surface{background:#fff}.bg-premium{background:linear-gradient(135deg,#0066FF,#0052CC)}
/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#0066FF;color:#fff}.btn-primary:hover{background:#0052CC}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-ghost{background:transparent;color:#0066FF;padding:8px}.btn-ghost:hover{background:#F3F4F6}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #E5E7EB}.btn-outline:hover{background:#F9FAFB}
/* ── Cards ── */
.card{background:#fff;border:1px solid #F0F0F0;border-radius:16px;padding:20px;transition:all .2s;cursor:pointer}
.card:hover{border-color:#D1D5DB;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.card:active{transform:scale(0.99)}
.card-selected{border-color:#0066FF;background:#F5F9FF;box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;gap:4px}
.badge-gpon{background:#EFF6FF;color:#0066FF}.badge-tv{background:#FEF3C7;color:#D97706}
.badge-sym{background:#ECFDF5;color:#059669}.badge-cere{background:#F3E8FF;color:#9333EA}
/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.animate-fadeUp{animation:fadeUp .35s ease-out both}.animate-fadeIn{animation:fadeIn .25s ease-out both}
.animate-pulse{animation:pulse 2s ease-in-out infinite}
.delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}
/* ── Inputs ── */
input,select{width:100%;padding:14px 16px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:#fff}
input:focus{border-color:#0066FF;box-shadow:0 0 0 3px rgba(0,102,255,.1)}
input::placeholder{color:#9CA3AF}
/* ── Shadows ── */
.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.04)}.shadow-md{box-shadow:0 4px 16px rgba(0,0,0,.06)}
/* ── Divider ── */
.divider{border:none;border-top:1px solid #F0F0F0;margin:16px 0}
/* ── Misc ── */
.rounded-full{border-radius:999px}.rounded-xl{border-radius:14px}.rounded-2xl{border-radius:16px}
.w-full{width:100%}.h-full{height:100%}.block{display:block}.hidden{display:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
/* Scroll suave */
html{scroll-behavior:smooth}
/* Checkbox personalizado */
.check-card{display:flex;align-items:center;gap:12px;padding:16px;border:1.5px solid #E5E7EB;border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.check-card:hover{border-color:#D1D5DB}.check-card.active{border-color:#0066FF;background:#F5F9FF}
.check-card .check{width:22px;height:22px;border:2px solid #D1D5DB;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}.check-card.active .check{background:#0066FF;border-color:#0066FF;color:#fff}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── API ──────────────────────────────────────────────────────────
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay'},
  async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async post(p,b){try{const r=await fetch(this.base+p,{method:'POST',headers:this.headers,body:JSON.stringify(b)});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}}};

// ─── State ────────────────────────────────────────────────────────
let step='dashboard',zoneData=[],zoneList=[],plans=[],selectedPlan=null,selectedZone=null,coverResult=null;
let clientType='RESIDENTIAL',formData={},docData={},userName='Carlos',userSales=18,userGoal=25,userComm=132000;

// ─── Init ─────────────────────────────────────────────────────────
async function init(){
  zoneData=await API.get('/api/v2/catalog/zones')||[];
  zoneList=[...new Map(zoneData.map(z=>[z.name,z])).values()];
  render();
}
init();

// ─── Router ──────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('app');
  const views={dashboard:()=>renderDashboard(),coverage:()=>renderCoverage(),plans:async()=>{el.innerHTML='<div class="px-5 py-6"><p class="text-xs muted">Cargando planes...</p></div>';el.innerHTML=await renderPlans();},form:()=>renderForm(),docs:()=>renderDocs(),confirm:()=>renderConfirm(),success:()=>renderSuccess(),opportunity:()=>renderOpportunity()};
  const viewFn=views[step]||renderDashboard;
  const result=viewFn();
  if(result instanceof Promise)result.then(function(html){if(html)el.innerHTML=html;});
  else el.innerHTML=result;
}
function go(s){step=s;render();}
function getComm(p){return Math.round((p||0)*0.1);}

// ─── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard(){
  const restan=userGoal-userSales;
  const hora=new Date().getHours();
  const saludo=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  const clientesAtendidos=userSales+3;
  return `<div class="px-5 py-6 animate-fadeUp">
    <!-- Saludo + resumen humano -->
    <div class="flex items-center gap-3 mb-4">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0066FF,#0052CC);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff">${userName[0]}</div>
      <div><p class="text-lg">${saludo}, ${userName}</p><p class="text-xs" style="color:#9CA3AF">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})}</p></div>
    </div>

    <!-- Hoy tienes (agenda, no KPIs) -->
    <div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:14px;padding:20px;margin-bottom:20px">
      <p style="font-size:15px;color:#003DA6;font-weight:500">Hoy has atendido a <strong>${clientesAtendidos} clientes</strong>.</p>
      <div style="margin-top:12px">
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0"><span style="color:#059669">🟢</span><span style="font-size:13px;color:#0052CC"><strong>3 clientes</strong> para visitar</span></div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0"><span style="color:#D97706">🟡</span><span style="font-size:13px;color:#0052CC"><strong>2 cotizaciones</strong> pendientes</span></div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0"><span style="color:#DC2626">🔴</span><span style="font-size:13px;color:#0052CC"><strong>1 cliente</strong> espera documentos</span></div>
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0"><span style="color:#3B82F6">🔵</span><span style="font-size:13px;color:#0052CC"><strong>4 seguimientos</strong> programados</span></div>
      </div>
    </div>

    <!-- Una acción principal: ATENDER CLIENTE -->
    <button class="btn btn-primary mb-4 shadow-md" onclick="go('coverage')" style="font-size:19px;padding:22px;border-radius:16px">🙋 Atender cliente</button>

    <!-- Próximas acciones (Next Best Action) -->
    <div style="background:#fff;border:1px solid #F0F0F0;border-radius:14px;padding:16px;margin-bottom:16px">
      <p style="font-size:14px;font-weight:600;margin-bottom:10px">📋 Próximas acciones</p>
      <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">
        <span style="font-size:12px">📞</span><div><p style="font-size:13px;font-weight:500">Llamar a María García</p><p style="font-size:11px;color:#6B7280">Cotización enviada · Seguimiento día 3</p></div>
      </div>
      <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">
        <span style="font-size:12px">📋</span><div><p style="font-size:13px;font-weight:500">Confirmar documentos de Pedro Martínez</p><p style="font-size:11px;color:#6B7280">Venta lista · Falta cédula</p></div>
      </div>
      <div style="display:flex;gap:10px;padding:8px 0">
        <span style="font-size:12px">📍</span><div><p style="font-size:13px;font-weight:500">Visitar a Carlos Ruiz</p><p style="font-size:11px;color:#6B7280">Interesado en MegaUltra 200 · Lérida</p></div>
      </div>
    </div>

    <!-- Resumen rápido -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <div style="flex:1;background:#F3F4F6;border-radius:10px;padding:12px;text-align:center"><p style="font-size:18px;font-weight:700;color:#0066FF">${userSales}</p><p style="font-size:10px;color:#6B7280">Ventas hoy</p></div>
      <div style="flex:1;background:#F3F4F6;border-radius:10px;padding:12px;text-align:center"><p style="font-size:18px;font-weight:700;color:#111827">$${Math.round(userComm/1000)}K</p><p style="font-size:10px;color:#6B7280">Comisiones</p></div>
      <div style="flex:1;background:#F3F4F6;border-radius:10px;padding:12px;text-align:center"><p style="font-size:18px;font-weight:700;color:#059669">${restan>0?restan:'✅'}</p><p style="font-size:10px;color:#6B7280">Meta</p></div>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-2">
      <button class="btn btn-outline" onclick="window.location='/customer360.html'" style="padding:14px;font-size:13px">👤 Buscar cliente</button>
      <button class="btn btn-outline" onclick="go('opportunity')" style="padding:14px;font-size:13px">📋 Nueva oportunidad</button>
    </div>
  </div>`;
}

// ─── COVERAGE ────────────────────────────────────────────────────
function renderCoverage(){
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('dashboard')">← Volver</button>
    <p class="text-lg mb-2">¿Dónde está el cliente?</p>
    <p class="text-sm mb-6">Elige el municipio para ver la cobertura disponible</p>
    <div class="grid grid-cols-2 gap-2 mb-6">${zoneList.map((z,i)=>`<div class="card animate-fadeUp delay-${(i%3)+1}" onclick="selectedZone={id:'${z.zone_id}',name:'${z.name}'};coverResult={available:true,msg:'Cobertura GPON disponible'};go('plans')" style="text-align:center;padding:16px;border-color:${selectedZone?.name===z.name?'#0066FF':'#F0F0F0'}">📍<br><span style="font-weight:600;font-size:13px">${z.name}</span></div>`).join('')}</div>
    ${selectedZone?`<p class="text-xs muted text-center">✅ Cobertura GPON disponible en ${selectedZone.name}</p>`:''}
  </div>`;
}

// ─── PLANS (Premium) ─────────────────────────────────────────────
function selectPlan(idx){
  const display=getDisplayPlans();
  if(display[idx]){selectedPlan=display[idx];go('form');}
}
function getDisplayPlans(){
  return plans.length?plans:[
    {name:'MegaUltra 50',price:49990,download_speed:50,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","Router WiFi"]'},
    {name:'MegaUltra 60',price:59990,download_speed:60,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","Router WiFi"]'},
    {name:'MegaUltra 80',price:69990,download_speed:80,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","TV Digital HD Gratis","Router WiFi"]'},
    {name:'MegaUltra 100',price:79990,download_speed:100,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","TV Digital HD Gratis","Router WiFi"]'},
    {name:'MegaUltra 200',price:99990,download_speed:200,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","TV Digital HD Gratis","Router WiFi","Soporte Prioritario"]'},
    {name:'MegaUltra 400',price:149990,download_speed:400,is_symmetric:1,benefits:'["Internet Ilimitado","Velocidad Simétrica","TV Digital HD Gratis","Router WiFi","Soporte VIP"]'},
  ];
}
async function renderPlans(){
  if(!plans.length&&selectedZone){
    const fetched=await API.get(`/api/v2/catalog/plans?zone_id=${selectedZone.id}&technology_id=tech-gpon`);
    if(fetched&&fetched.length)plans=fetched;
  }
  const display=getDisplayPlans();
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('coverage')">← Municipios</button>
    <p class="text-lg mb-1">Planes en ${selectedZone?.name||'Fresno'}</p>
    <p class="text-sm mb-6">GPON · Fibra Óptica Simétrica · INTERPLAY</p>
    <div class="flex flex-col gap-4">${display.map(function(plan,idx){
      let ben=[];
      try{ben=JSON.parse(plan.benefits||'[]');}catch(e){}
      const hasTv=ben.some(function(b){return b.toLowerCase().includes('tv');});
      const comm=getComm(plan.price);
      return `<div class="card animate-fadeUp delay-${(idx%3)+1}" onclick="selectPlan(${idx})" style="padding:24px">
        <div class="flex items-center gap-2 mb-3">
          <span class="badge badge-gpon">🔵 GPON</span>
          ${plan.download_speed>=100?'<span class="badge badge-sym">⚡ Simétrico</span>':''}
          ${hasTv?'<span class="badge badge-tv">🟢 TV GRATIS</span>':''}
        </div>
        <div class="flex justify-between items-start mb-3">
          <div><p class="text-lg" style="margin-bottom:2px">${plan.name}</p>
            <p class="text-xs muted">${plan.download_speed} Mbps Simétricos · Fibra Óptica</p></div>
          <div class="text-right"><p class="text-2xl primary">$${(plan.price||0).toLocaleString('es-CO')}</p><p class="text-xs muted">/mes</p></div>
        </div>
        <hr class="divider">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${plan.download_speed<=50?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">👤 1-2 personas</span>':''}
          ${plan.download_speed>=100&&plan.download_speed<200?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">👨‍👩‍👧 3-4 personas</span>':''}
          ${plan.download_speed>=200?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">👨‍👩‍👧‍👦 4+ personas</span>':''}
          ${plan.download_speed>=100?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">📱 10+ dispositivos</span>':''}
          ${plan.download_speed>=200?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">🎬 Streaming 4K</span>':''}
          ${plan.download_speed>=100?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">💻 Teletrabajo</span>':''}
          ${plan.download_speed>=200?'<span class="text-xs" style="background:#F3F4F6;padding:4px 10px;border-radius:6px">🎮 Gaming</span>':''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
          <span class="text-xs" style="color:#374151">✓ ${plan.download_speed} Mbps Simétricos</span>
          <span class="text-xs" style="color:#374151">✓ Internet Ilimitado</span>
          <span class="text-xs" style="color:${hasTv?'#059669':'#6B7280'}">${hasTv?'✓ TV Digital HD GRATIS':'📺 TV no incluida'}</span>
          <span class="text-xs" style="color:#374151">✓ Router WiFi</span>
        </div>
        <hr class="divider">
        <div class="flex items-center justify-between">
          <span class="text-xs success font-semibold">💰 Comisión: $${comm.toLocaleString('es-CO')}</span>
          <span class="text-xs muted">⏱ 2-3 días</span>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

// ─── FORM ─────────────────────────────────────────────────────────
function renderForm(){
  if(!selectedPlan)return go('plans');
  const comm=getComm(selectedPlan.price);
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('plans')">← Planes</button>
    <div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:16px;padding:20px;margin-bottom:24px">
      <p class="font-bold text-lg" style="color:#003DA6">${selectedPlan.name}</p>
      <div class="flex items-center justify-between mt-2">
        <span class="text-sm" style="color:#0052CC">$${(selectedPlan.price||0).toLocaleString('es-CO')}/mes</span>
        <span class="text-sm success font-semibold">💰 $${comm.toLocaleString('es-CO')}</span>
      </div>
    </div>
    <p class="text-lg mb-4">Datos del cliente</p>
    <input id="f-name" placeholder="Nombre completo" class="mb-3">
    <input id="f-phone" placeholder="Teléfono" type="tel" class="mb-3">
    <div class="grid grid-cols-2 gap-3 mb-3"><input id="f-doc" placeholder="Documento"><input id="f-email" placeholder="Correo"></div>
    <input id="f-addr" placeholder="Dirección" class="mb-4">
    <p class="text-xs font-semibold" style="margin-bottom:8px">Tipo de cliente</p>
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="check-card ${clientType==='RESIDENTIAL'?'active':''}" onclick="clientType='RESIDENTIAL';render()">
        <div class="check">${clientType==='RESIDENTIAL'?'✓':''}</div>
        <div><p class="text-sm font-medium" style="color:#111827">Hogar</p><p class="text-xs muted">IVA 0%</p></div>
      </div>
      <div class="check-card ${clientType==='COMMERCIAL'?'active':''}" onclick="clientType='COMMERCIAL';render()">
        <div class="check">${clientType==='COMMERCIAL'?'✓':''}</div>
        <div><p class="text-sm font-medium" style="color:#111827">Empresa</p><p class="text-xs muted">IVA 19%</p></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveClient()">Continuar →</button>
  </div>`;
}
function saveClient(){
  formData={name:document.getElementById('f-name')?.value||'Cliente',phone:document.getElementById('f-phone')?.value||'',doc:document.getElementById('f-doc')?.value||'',email:document.getElementById('f-email')?.value||'',address:document.getElementById('f-addr')?.value||''};
  go('docs');
}

// ── DOCS ──────────────────────────────────────────────────────────
function renderDocs(){
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('form')">← Datos</button>
    <p class="text-lg mb-2">Documentos requeridos</p>
    <p class="text-sm mb-6">Confirma los documentos del cliente para continuar</p>
    <div class="check-card ${docData.cc?'active':''}" onclick="docData.cc=!docData.cc;render()">
      <div class="check">${docData.cc?'✓':''}</div>
      <div><p class="text-sm font-medium" style="color:#111827">Copia de cédula</p><p class="text-xs muted">Documento de identidad</p></div>
    </div>
    <div class="check-card ${docData.recibo?'active':''}" onclick="docData.recibo=!docData.recibo;render()">
      <div class="check">${docData.recibo?'✓':''}</div>
      <div><p class="text-sm font-medium" style="color:#111827">Fotocopia recibo público</p><p class="text-xs muted">Servicio público reciente</p></div>
    </div>
    <button class="btn btn-primary mt-6" onclick="go('confirm')">Revisar venta →</button>
  </div>`;
}

// ── CONFIRM ──────────────────────────────────────────────────────
function renderConfirm(){
  if(!selectedPlan)return go('plans');
  const price=selectedPlan.price||0,comm=getComm(price),iva=clientType==='COMMERCIAL'?Math.round(price*0.19):0;
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('docs')">← Documentos</button>
    <p class="text-lg mb-4">Confirmar venta</p>
    <div class="card shadow-sm" style="cursor:default;padding:24px">
      <div class="flex justify-between items-start mb-3">
        <div><p class="font-bold" style="font-size:17px">${selectedPlan.name}</p><p class="text-xs muted">${selectedZone?.name||'Fresno'} · GPON</p></div>
        <p class="text-xl primary font-bold">$${price.toLocaleString('es-CO')}<span style="font-size:12px;color:#9CA3AF;font-weight:400">/mes</span></p>
      </div>
      <hr class="divider">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:12px">
        <span class="text-xs muted">Cliente</span><span class="text-xs font-medium" style="text-align:right">${formData.name||'Cliente'}</span>
        <span class="text-xs muted">Tipo</span><span class="text-xs font-medium" style="text-align:right">${clientType==='RESIDENTIAL'?'Residencial':'Comercial'}</span>
        <span class="text-xs muted">Instalación</span><span class="text-xs font-medium" style="text-align:right">2-3 días hábiles</span>
        ${formData.phone?`<span class="text-xs muted">Teléfono</span><span class="text-xs font-medium" style="text-align:right">${formData.phone}</span>`:''}
      </div>
      <hr class="divider">
      <div class="flex items-center justify-between">
        <span class="text-sm success font-semibold">💰 Comisión</span>
        <span class="text-sm success font-bold">$${comm.toLocaleString('es-CO')}</span>
      </div>
    </div>
    ${iva>0?`<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:12px;margin-top:12px;font-size:13px;color:#92400E">IVA 19% aplicado: $${iva.toLocaleString('es-CO')}</div>`:''}
    <button class="btn btn-success mt-6 shadow-md" onclick="submitSale()" style="font-size:17px">✅ Registrar venta</button>
  </div>`;
}

// ── SUBMIT ───────────────────────────────────────────────────────
async function submitSale(){
  await API.post('/api/v1/referrals',{fullName:formData.name,phone:formData.phone,email:formData.email,address:formData.address,planId:selectedPlan?.id,source:'SALES_APP'});
  userSales++;userComm+=getComm(selectedPlan?.price||0);
  go('success');
}
function renderSuccess(){
  const comm=getCommission(selectedPlan?.price||0);
  userComm+=comm;
  return `<div class="px-5 py-8 text-center animate-fadeUp">
    <div style="font-size:72px;margin-bottom:12px">🎉</div>
    <p class="text-xl mb-2">¡Un hogar más conectado!</p>
    <p class="text-sm muted mb-6">${selectedPlan?.name} · ${selectedZone?.name||'Fresno'}</p>
    <div style="background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-radius:16px;padding:20px;margin-bottom:24px;text-align:left">
      <p style="font-size:14px;font-weight:600;color:#059669">Resumen</p>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <span style="font-size:13px;color:#047857">Cliente:</span><span style="font-size:13px;font-weight:500;color:#047857">${formData.name||'Cliente'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:13px;color:#047857">Plan:</span><span style="font-size:13px;font-weight:500;color:#047857">${selectedPlan?.name} · $${(selectedPlan?.price||0).toLocaleString('es-CO')}/mes</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:13px;color:#059669;font-weight:600">💰 Comisión:</span><span style="font-size:13px;font-weight:600;color:#059669">$${comm.toLocaleString('es-CO')}</span>
      </div>
      <p style="font-size:11px;color:#047857;margin-top:8px">📋 Pendiente: validación de documentos</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <button class="btn btn-primary" onclick="resetAll()" style="padding:16px;font-size:15px">📝 Nueva venta</button>
      <button class="btn btn-outline" onclick="go('dashboard')" style="padding:16px;font-size:15px">🏠 Ir al inicio</button>
    </div>
  </div>`;
}
function resetAll(){selectedPlan=null;selectedZone=null;formData={};docData={};go('coverage');}

// ── OPPORTUNITY ──────────────────────────────────────────────────
function renderOpportunity(){
  return `<div class="px-5 py-6 animate-fadeUp">
    <button class="btn-ghost mb-4" onclick="go('dashboard')">← Volver</button>
    <p class="text-lg mb-2">Registrar oportunidad</p>
    <p class="text-sm muted mb-6">El cliente no compró hoy. ¿Cuál fue el motivo?</p>
    <div class="grid grid-cols-2 gap-2 mb-6">${['Precio','Comparando','Lo pensará','Sin documentos','Sin cobertura','Esperando pago','Hablar con familia','Otro'].map(function(m){return`<div class="card" onclick="selectedReason='${m}';render()" style="text-align:center;padding:14px;border-color:${selectedReason===m?'#0066FF':'#F0F0F0'}">${m}</div>`;}).join('')}</div>
    <button class="btn btn-success" onclick="resetAll()">✅ Registrar</button>
  </div>`;
}
let selectedReason='';
</script>
</body>
</html>
