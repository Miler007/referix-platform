  async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});return(await r.json()).data}catch{return null}},

// ═══════════════════════════════════════════════════════════════════
// CERE — Customer Experience Recommendation Engine
// ═══════════════════════════════════════════════════════════════════
const DEVICE_WEIGHTS={smartphones:1.5,smartTvs:8,computers:10,laptops:8,tablets:4,consoles:12,ipCameras:6,dvrNvr:15,wifiPrinters:2,smartSpeakers:1.5,iotDevices:1};
const USAGE_WEIGHTS={socialMedia:5,browsing:3,music:3,streamingHD:8,streaming4K:15,netflix:10,disneyPlus:10,primeVideo:10,youtube:5,twitch:8,remoteWork:15,virtualClasses:12,videoCalls:10,gaming:20,largeDownloads:25,cloudBackups:12,securityCameras:8};

class CERE {
  buildProfile(data){return{householdSize:data.householdSize||2,devices:data.devices||{smartphones:2,smartTvs:1,computers:0,laptops:1,tablets:0,consoles:0,ipCameras:0,dvrNvr:0,wifiPrinters:0,smartSpeakers:0,iotDevices:0},usage:data.usage||{socialMedia:true,browsing:true,streamingHD:true,remoteWork:false,gaming:false},simultaneity:data.simultaneity||2,priority:data.priority||'ESTABILIDAD'}}

  calculateDemand(profile){
    let total=0;
    Object.entries(profile.devices).forEach(([k,v])=>{total+=v*(DEVICE_WEIGHTS[k]||1)});
    Object.entries(profile.usage).forEach(([k,v])=>{if(v)total+=USAGE_WEIGHTS[k]||0});
    total+=profile.householdSize*5+profile.simultaneity*10;
    return total;
  }

  demandLevel(totalSpeed){
    if(!totalSpeed||totalSpeed<=0)return'MUY_ALTA';
    const pct=Math.min(100,Math.round((this.lastDemand||50)/totalSpeed*100));
    if(pct<=60)return{level:'EXCELENTE',pct};
    if(pct<=75)return{level:'BUENO',pct};
    if(pct<=85)return{level:'ACEPTABLE',pct};
    if(pct<=90)return{level:'RIESGOSO',pct};
    return{level:'NO_RECOMENDADO',pct};
  }

  recommend(profile,plans){
    this.lastDemand=this.calculateDemand(profile);
    const scored=plans.map(p=>{
      const speed=p.download_speed||50;
      const dl=this.demandLevel(speed);
      const compat=Math.max(5,Math.min(100,Math.round(100-(this.lastDemand/speed*100)*0.8)));
      const riskCompat=compat;
      return{...p,compatibility:compat,riskLevel:dl.level,demandPercent:dl.pct,demandIndex:dl.pct<=60?'BAJA':dl.pct<=75?'MEDIA':dl.pct<=85?'ALTA':'MUY_ALTA',recommended:compat>=75&&dl.level!=='NO_RECOMENDADO'&&dl.level!=='RIESGOSO'};
    });
    scored.sort((a,b)=>b.compatibility-a.compatibility);
    const best=scored[0];
    const explanation=this.explain(profile,best,scored);
    const warnings=scored.filter(p=>!p.recommended).map(p=>`⚠ No recomendamos ${p.name}. Riesgo: ${p.riskLevel}.`);
    return{recommended:best,alternatives:scored.slice(1,3),explanation,warnings};
  }

  explain(profile,plan,all){
    const parts=[];
    const totalDevices=Object.values(profile.devices).reduce((a,b)=>a+b,0);
    if(totalDevices>0)parts.push(`${totalDevices} dispositivos conectados`);
    if(profile.simultaneity>1)parts.push(`${profile.simultaneity} personas usan Internet al mismo tiempo`);
    const activeUsage=Object.entries(profile.usage).filter(([k,v])=>v).map(([k])=>({socialMedia:'redes sociales',streamingHD:'streaming HD',streaming4K:'streaming 4K',remoteWork:'teletrabajo',gaming:'gaming',videoCalls:'videollamadas',virtualClasses:'clases virtuales'}[k]||k)).filter(Boolean);
    if(activeUsage.length>0)parts.push(`uso frecuente de ${activeUsage.join(', ')}`);
    parts.push(`compatibilidad del ${plan?.compatibility||'?'}%`);
    return`Recomendamos ${plan?.name||'este plan'} porque tiene ${parts.join(', ')}.${plan?.riskLevel==='EXCELENTE'?' Este plan ofrece el mejor equilibrio entre estabilidad, rendimiento y crecimiento.':plan?.riskLevel==='BUENO'?' Este plan tiene capacidad suficiente para el hogar.':''}`;
  }
}
const cere=new CERE();
let customerProfile=null;
// ── State ─────────────────────────────────────────────────────────
let view='dashboard',zoneList=[],zoneData=[],plans=[],selectedPlan=null,clientType='RESIDENTIAL',form={},docs={cc:false,recibo:false};

// ── Init ──────────────────────────────────────────────────────────
(async()=>{zoneData=await API.get('/api/v2/catalog/zones')||[];zoneList=[...new Map(zoneData.map(z=>[z.name,z])).values()];render();})();

// ── Router ─────────────────────────────────────────────────────────

  const el=document.getElementById('app');
  el.innerHTML={

  }[view]||renderDashboard();
}

let cereData={householdSize:2,simultaneity:2,smartphones:2,smartTvs:1,laptops:1,priority:'ESTABILIDAD',streamingHD:true,remoteWork:false,gaming:false,videoCalls:false,virtualClasses:false,socialMedia:true,browsing:true};

      </div>

        <div class="grid grid-cols-2 gap-2">${[['smartphones','📱 Celulares'],['smartTvs','📺 Smart TV'],['laptops','💻 Portátiles'],['computers','🖥 Computadores'],['tablets','📟 Tablets'],['consoles','🎮 Consolas'],['ipCameras','📷 Cámaras'],['smartSpeakers','🔊 Alexa/Google']].map(([k,label])=>`<div class="flex items-center gap-2 border rounded-xl px-3 py-2"><span class="text-xs flex-1">${label}</span>

// COVERAGE - Auto-detect technology from address

let selectedZone=null,coverResult=null;
function initCoverage(){selectedZone=null;coverResult=null;view='coverage';render();}
function selectCoverageZone(id,name){selectedZone={id,name};coverResult=null;view='coverage';render();}
async function checkCoverage(){
  const addr=document.getElementById('cov-addr')?.value||'';
  if(!addr||!selectedZone) return;
  coverResult={loading:true};view='coverage';render();
  // Simulate coverage check
  const techs=zoneData.filter(z=>z.name===selectedZone.name);
  setTimeout(()=>{
    coverResult={available:true,technology:techs[0]?.technology_code||'GPON',technologyName:techs[0]?.technology||'Fibra Óptica',zoneName:selectedZone.name};
    view='coverage';render();
  },800);
}
function continueToProfile(){
  view='profile';render();
}
function continueToPlans(){
  const techId=zoneData.find(z=>z.name===selectedZone?.name)?.technology_id;
  loadPlans(selectedZone.id,techId);
}

function renderCoverage(){

    <div class="mb-4"><label class="text-xs font-medium text-neutral-600 mb-1.5 block">Municipio</label>
      <div class="grid grid-cols-2 gap-2">${zoneList.map(z=>`<button onclick="selectCoverageZone('${z.zone_id}','${z.name}')" class="rounded-xl border-2 py-3 text-sm text-center transition-all ${selectedZone?.name===z.name?'border-primary-500 bg-primary-50 text-primary-700 font-medium':'border-neutral-200 hover:border-primary-300'}">📍 ${z.name}</button>`).join('')}
    </div></div>
    ${selectedZone?`<div class="mb-4"><label class="text-xs font-medium text-neutral-600 mb-1.5 block">Dirección</label><input id="cov-addr" placeholder="Ej: Cra 5 #10-20, ${selectedZone.name}" class="w-full rounded-xl border border-neutral-300 px-4 py-3 text-sm"></div>
    <button onclick="checkCoverage()" class="w-full rounded-xl bg-primary-500 text-white py-3.5 font-semibold hover:bg-primary-600">Verificar cobertura</button>`:''}
    ${coverResult?.loading?`<div class="text-center py-8 text-neutral-400">Verificando cobertura...</div>`:''}
    ${coverResult?.available?`<div class="mt-4 rounded-xl bg-success-50 border border-success-200 p-4">
      <p class="font-semibold text-success-700 mb-2">✅ Cobertura disponible</p>

      <button onclick="continueToProfile()" class="w-full mt-4 rounded-xl bg-success-500 text-white py-3 font-semibold hover:bg-success-600">Continuar →</button>
    </div>`:coverResult&&!coverResult.loading&&!coverResult.available?`<div class="mt-4 rounded-xl bg-danger-50 border border-danger-200 p-4">
      <p class="font-semibold text-danger-700">❌ Sin cobertura</p><p class="text-sm text-danger-600 mt-1">No hay cobertura disponible en esta dirección</p></div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// PLANS - With badges, recommendations, benefits
// ═══════════════════════════════════════════════════════════════════
async function loadPlans(zoneId,techId){
  const p=await API.get(`/api/v2/catalog/plans?zone_id=${zoneId}&technology_id=${techId}`);
  if(p)plans=p;
  selectedPlan=null;view='plans';render();
}

function selectPlan(plan){
  selectedPlan=plan;
  setTimeout(()=>{if(view==='form'||view==='docs'||view==='confirm')return;selectedPlan=null;render();},1200000);
  view='form';render();
}

        </div>
        <div class="grid grid-cols-2 gap-1 text-xs text-neutral-600 mt-2">
          <span>🚀 ${result.recommended.download_speed} Mbps ${result.recommended.is_symmetric?'Simétricos':''}</span>

          <span class="text-[10px] text-success-600">Ocupación estimada: ${result.recommended.demandPercent}%</span>
        </div>
        <button onclick="selectPlan(plans.find(p=>p.id==='${result.recommended.id}'))" class="w-full mt-3 rounded-xl bg-primary-500 text-white py-3 font-semibold hover:bg-primary-600">Seleccionar plan</button>
      </div>`:''}

      ${result.alternatives.map(p=>{
        const isRisky=p.riskLevel==='RIESGOSO'||p.riskLevel==='NO_RECOMENDADO';
        return `<div onclick="${isRisky?'':`selectPlan(plans.find(pl=>pl.id==='${p.id}'))`}" class="rounded-xl bg-white border-2 p-4 card-hover ${isRisky?'opacity-70 border-neutral-200 cursor-not-allowed':'border-neutral-200 cursor-pointer hover:border-primary-300'}">
          <div class="flex justify-between items-center mb-2">
            <h3 class="font-semibold text-neutral-900">${p.name}</h3>
            <div class="flex items-center gap-1">
              <span class="text-[10px] px-2 py-0.5 rounded-full ${p.riskLevel==='EXCELENTE'?'bg-success-100 text-success-700':p.riskLevel==='BUENO'?'bg-primary-100 text-primary-700':p.riskLevel==='ACEPTABLE'?'bg-warning-100 text-warning-700':'bg-danger-100 text-danger-700'}">${p.riskLevel}</span>
              <span class="text-[10px] text-neutral-400">${p.compatibility}%</span>
            </div>
          </div>
          <div class="flex items-baseline gap-1"><span class="text-xl font-bold text-neutral-800">$${(p.price||0).toLocaleString('es-CO')}</span><span class="text-xs text-neutral-400">/mes</span></div>
          <div class="text-xs text-neutral-500 mt-1">🚀 ${p.download_speed} Mbps</div>
          ${isRisky?`<div class="text-[10px] text-danger-600 mt-1">⚠ No recomendado para este perfil. Riesgo de lentitud y reclamos.</div>`:''}
          ${!isRisky?`<div class="flex items-center justify-between mt-2 p-1.5 rounded-lg bg-success-50"><span class="text-xs text-success-700">💰 $${Math.round((p.price||0)*0.10).toLocaleString('es-CO')}</span><span class="text-[10px] text-success-600">${p.demandPercent}% ocupación</span></div>`:''}
        </div>`;
      }).join('')}

      ${plans.filter(p=>!result.recommended||p.id!==result.recommended.id).slice(result.alternatives.length).map(p=>{
        const compat=cere.calculateDemand(customerProfile);
        const pct=Math.min(100,Math.round(compat/(p.download_speed||50)*100));
        const risk=pct>85?'NO_RECOMENDADO':pct>75?'RIESGOSO':'ACEPTABLE';
        return `<div onclick="selectPlan(plans.find(pl=>pl.id==='${p.id}'))" class="rounded-xl bg-white border-2 border-neutral-200 p-3 card-hover cursor-pointer opacity-60">
          <div class="flex justify-between items-center"><h3 class="font-semibold text-sm text-neutral-900">${p.name}</h3><span class="text-[10px] text-neutral-400">$${(p.price||0).toLocaleString('es-CO')}/mes</span></div>
          <div class="text-xs text-neutral-400 mt-1">🚀 ${p.download_speed} Mbps · Ocupación estimada: ${pct}%</div>
          <div class="text-[10px] text-danger-500 mt-0.5">⚠ No recomendado · Riesgo: ${risk}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function saveClientForm(){
  const name=document.getElementById('sf-name')?.value;

  form={name,phone,doc:document.getElementById('sf-doc')?.value,email:document.getElementById('sf-email')?.value,address:document.getElementById('sf-address')?.value,nit:document.getElementById('sf-nit')?.value,businessName:document.getElementById('sf-business')?.value};
  view='docs';render();
}

// SUBMIT
// ═══════════════════════════════════════════════════════════════════
async function submitSale(){
  const ref=await API.post('/api/v1/referrals',{fullName:form.name,phone:form.phone,email:form.email||'',address:form.address||'',planId:selectedPlan?.id,source:'SALES_APP'});
  if(ref){salesCount++;estimatedCommission+=Math.round((selectedPlan?.price||0)*0.10);view='success';render();}
  else alert('Error al registrar. Intenta de nuevo.');
}

  const price=selectedPlan?.price||0,commission=Math.round(price*0.10);
  return `<div class="p-5 text-center pt-16 slide-in">
