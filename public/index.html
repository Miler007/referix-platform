<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Referix — Plataforma de Gestión Comercial</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>*{font-family:'Inter',sans-serif}.slide-in{animation:slideIn .3s ease-out}@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
<div id="app" class="w-full max-w-sm"></div>
<script>
const API='https://referix-api.reto-diario.workers.dev';

const APPS={
  admin:{name:'Console',path:'/console.html',roles:['ADMIN','SUPERVISOR'],icon:'🏢',desc:'Administración'},
  sales:{name:'Sales',path:'/sales.html',roles:['SALES','ASESOR','ADMIN'],icon:'📝',desc:'Ventas'},
  partner:{name:'Partner',path:'/partner.html',roles:['REFERIDOR'],icon:'🤝',desc:'Referidos'},
  operations:{name:'Operations',path:'/ops.html',roles:['TECHNICIAN'],icon:'🔧',desc:'Instalaciones'},
  executive:{name:'Executive',path:'/exec.html',roles:['GERENTE','DIRECTOR','ADMIN'],icon:'📊',desc:'Dashboard'}
};

let user=null,roles=[];

async function doLogin(){
  const email=document.getElementById('login-email').value;
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){alert('Ingresa correo y contraseña');return;}
  try{
    const r=await fetch(API+'/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(d.errors){alert('Credenciales inválidas');return;}
    user=d.data.user;
    roles=[user.role];
    showApps();
  }catch(e){alert('Error de conexión');}
}

function showApps(){
  const available=Object.entries(APPS).filter(([_,a])=>a.roles.some(r=>roles.includes(r)));
  document.getElementById('app').innerHTML=`
    <div class="slide-in text-center">
      <div class="w-16 h-16 rounded-2xl bg-primary-500 flex items-center justify-center text-white text-3xl font-bold mx-auto mb-3">R</div>
      <h2 class="text-xl font-bold text-neutral-900 mb-1">Bienvenido, ${user?.name||'Usuario'}</h2>
      <p class="text-sm text-neutral-500 mb-6">Selecciona una aplicación</p>
      <div class="space-y-2">${available.map(([k,a])=>`<a href="${a.path}" class="block text-left flex items-center gap-4 rounded-xl bg-white border-2 border-neutral-200 p-4 hover:border-primary-400 hover:bg-primary-50 transition-all shadow-sm">
        <div class="w-12 h-12 rounded-xl bg-primary-50 flex items-center justify-center text-2xl">${a.icon}</div>
        <div><p class="font-semibold text-neutral-900">${a.name}</p><p class="text-xs text-neutral-500">${a.desc}</p></div>
      </a>`).join('')}</div>
      <button onclick="location.reload()" class="mt-6 text-sm text-neutral-400 hover:text-neutral-600">← Cerrar sesión</button>
    </div>`;
}

document.getElementById('app').innerHTML=`
  <div class="slide-in">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-primary-500 flex items-center justify-center text-white text-3xl font-bold mx-auto mb-3">R</div>
      <h1 class="text-2xl font-bold text-neutral-900">Referix</h1>
      <p class="text-sm text-neutral-500 mt-1">Inicia sesión para continuar</p>
    </div>
    <div class="bg-white rounded-2xl shadow-lg border p-6 space-y-4">
      <div><label class="text-xs font-medium text-neutral-600 mb-1.5 block">Correo electrónico</label>
        <input id="login-email" type="email" value="admin@interplay.com" class="w-full rounded-xl border border-neutral-300 px-4 py-3 text-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none"></div>
      <div><label class="text-xs font-medium text-neutral-600 mb-1.5 block">Contraseña</label>
        <input id="login-pass" type="password" value="admin123" class="w-full rounded-xl border border-neutral-300 px-4 py-3 text-sm focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none"></div>
      <button onclick="doLogin()" class="w-full rounded-xl bg-primary-500 text-white py-3.5 font-semibold hover:bg-primary-600 active:scale-[0.98] transition-all">Ingresar</button>
    </div>
    <div class="mt-4 text-center text-[10px] text-neutral-400">
      Demo: admin@interplay.com / admin123
    </div>
  </div>`;
</script>
</body>
</html>
