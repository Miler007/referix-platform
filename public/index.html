<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referix — Plataforma de Gestión Comercial</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: { 50: '#EFF6FF', 100: '#DBEAFE', 200: '#BFDBFE', 300: '#93C5FD', 400: '#60A5FA', 500: '#0066FF', 600: '#0052CC', 700: '#003DA6', 800: '#002980', 900: '#001A59' },
        success: { 50: '#ECFDF5', 100: '#D1FAE5', 200: '#A7F3D0', 300: '#6EE7B7', 400: '#34D399', 500: '#10B981', 600: '#059669', 700: '#047857', 800: '#065F46', 900: '#064E3B' },

}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
* { font-family: 'Inter', sans-serif; }
.sidebar-item { transition: all 0.2s; }
.sidebar-item:hover { background: #F3F4F6; }
.sidebar-item.active { background: #EFF6FF; color: #0066FF; font-weight: 600; }
.card-hover { transition: all 0.2s; }
.card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
.wizard-step { transition: all 0.3s; }
.slide-in { animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.pulse-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<div id="app" class="flex h-screen bg-neutral-50">
  <!-- SIDEBAR -->
  <aside class="w-64 bg-white border-r border-neutral-200 flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-neutral-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-primary-500 flex items-center justify-center text-white font-bold text-sm">R</div>
        <div>
          <h1 class="text-lg font-bold text-primary-600">Referix</h1>
          <p class="text-[10px] text-neutral-400 uppercase tracking-widest">Console</p>
        </div>
      </div>
    </div>
    <div class="px-3 pt-3">
      <button onclick="toggleSearch()" class="w-full flex items-center gap-2 rounded-lg bg-neutral-100 px-3 py-2 text-sm text-neutral-500 hover:bg-neutral-200 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <span class="flex-1 text-left">Buscar en Referix...</span>
        <span class="text-[10px] text-neutral-400 bg-white px-1.5 py-0.5 rounded font-medium">Ctrl+K</span>
      </button>
    </div>
    <nav class="flex-1 overflow-y-auto p-3 space-y-0.5" id="sidebar-nav"></nav>
    <div class="p-4 border-t border-neutral-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 font-bold text-sm">I</div>
        <div class="flex-1">
          <p class="text-sm font-semibold text-neutral-900">INTERPLAY</p>
          <div class="flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-success-500 pulse-dot"></span>
            <span class="text-[10px] text-neutral-400">Demo · Plan Enterprise</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-y-auto" id="main-content"></main>
</div>

<!-- SEARCH MODAL -->
<div id="search-modal" class="fixed inset-0 bg-black/30 z-50 hidden items-start justify-center pt-24" onclick="closeSearch(event)">
  <div class="w-full max-w-xl bg-white rounded-xl shadow-2xl border overflow-hidden slide-in" onclick="event.stopPropagation()">
    <div class="flex items-center gap-3 p-4 border-b">
      <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="global-search" autofocus class="flex-1 outline-none text-base placeholder-neutral-300" placeholder="Buscar usuarios, planes, instalaciones, facturas...">
      <span class="text-[10px] text-neutral-400 bg-neutral-100 px-2 py-0.5 rounded">ESC</span>
    </div>
    <div class="p-2 max-h-80 overflow-y-auto" id="search-results"></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────

const modules = [
  { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard', color: 'text-primary-500' },
  { id: 'organization', label: 'Organización', icon: 'building', color: 'text-primary-500' },
  { id: 'commercial', label: 'Comercial', icon: 'trending-up', color: 'text-success-500' },
  { id: 'operations', label: 'Operaciones', icon: 'tool', color: 'text-warning-500' },
  { id: 'financial', label: 'Financiero', icon: 'wallet', color: 'text-emerald-500' },
  { id: 'identity', label: 'Seguridad', icon: 'shield', color: 'text-danger-500' },
  { id: 'integrations', label: 'Integraciones', icon: 'link', color: 'text-indigo-500' },
  { id: 'digital-twin', label: 'Gemelo Digital', icon: 'copy', color: 'text-purple-500' },
  { id: 'catalog', label: 'Catálogo', icon: 'package', color: 'text-emerald-500' },
  { id: 'monitoring', label: 'Monitoreo', icon: 'activity', color: 'text-neutral-600' },
];

const sidebarIcons = {
  'package': 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4',
  'layout-dashboard': 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1',
  'building': 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4',
  'trending-up': 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6',
  'tool': 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z',
  'wallet': 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z',
  'shield': 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z',
  'link': 'M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1',
  'copy': 'M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z',
  'activity': 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z',
};

// ─── RENDER ──────────────────────────────────────────────────────────

let currentModule = 'dashboard';

function initSidebar() {
  const nav = document.getElementById('sidebar-nav');
  modules.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item w-full flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-neutral-600';
    btn.dataset.id = m.id;
    btn.innerHTML = `<svg class="w-5 h-5 ${m.color}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="${sidebarIcons[m.icon]}"/></svg>${m.label}`;
    btn.onclick = () => navigate(m.id);
    nav.appendChild(btn);
  });
  navigate('dashboard');
}

function navigate(id) {
  currentModule = id;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.sidebar-item[data-id="${id}"]`);
  if (active) active.classList.add('active');
  renderContent(id);
}

function renderContent(id) {
  const main = document.getElementById('main-content');
  switch(id) {
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'organization': main.innerHTML = renderOrganization(); break;
    case 'commercial': main.innerHTML = renderCommercial(); break;
    case 'operations': main.innerHTML = renderOperations(); break;
    case 'financial': main.innerHTML = renderFinancial(); break;
    case 'identity': main.innerHTML = renderIdentity(); break;
    case 'integrations': main.innerHTML = renderIntegrations(); break;
    case 'digital-twin': main.innerHTML = renderDigitalTwin(); break;
    case 'catalog': main.innerHTML = renderCatalog(); break;
    case 'monitoring': main.innerHTML = renderMonitoring(); break;
  }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────

function renderDashboard() {
  return `
    <div class="p-6 slide-in">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-neutral-900">Panel de control</h1>
        <p class="text-sm text-neutral-500 mt-1">Bienvenido a Referix — Centro de Gobierno de INTERPLAY</p>
      </div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${[
          { label: 'Ventas del mes', value: '47', sub: '34% vs mes anterior', trend: '+15%', positive: true, icon: '📈', color: 'bg-primary-50' },
          { label: 'Ingreso mensual', value: '$18,453', sub: 'Próximo: $21,200', trend: '+22%', positive: true, icon: '💰', color: 'bg-success-50' },
          { label: 'Comisión pendiente', value: '$3,240', sub: '14 comisiones en hold', trend: '', positive: true, icon: '⏳', color: 'bg-warning-50' },

        ].map(k => `

              <span class="text-xl">${k.icon}</span>
            </div>
            <p class="text-2xl font-bold text-neutral-900">${k.value}</p>
            <p class="text-xs text-neutral-400 mt-1">${k.sub}</p>
            ${k.trend ? `<p class="text-xs font-medium mt-1 ${k.positive ? 'text-success-600' : 'text-danger-600'}">${k.positive ? '↑' : '↓'} ${k.trend}</p>` : ''}
          </div>`).join('')}
      </div>

      <div class="grid grid-cols-2 gap-6 mb-6">
        <div class="rounded-xl bg-white border p-5">
          <h2 class="font-semibold text-neutral-900 mb-4">Embudo de ventas</h2>
          ${[
            { stage: 'Registrados', count: 100, pct: 100 },
            { stage: 'Cobertura OK', count: 87, pct: 87 },
            { stage: 'Aprobados', count: 65, pct: 65 },
            { stage: 'Instalados', count: 52, pct: 52 },
            { stage: 'Activos', count: 47, pct: 47 },
            { stage: 'Comisión pagada', count: 39, pct: 39 },
          ].map(f => `
            <div class="flex items-center gap-3 mb-2">
              <span class="w-28 text-xs text-neutral-600 text-right">${f.stage}</span>
              <div class="flex-1 h-6 bg-neutral-100 rounded-full overflow-hidden">
                <div class="h-full bg-primary-500 rounded-full flex items-center justify-end pr-2 text-[10px] text-white font-medium" style="width:${f.pct}%">${f.pct > 20 ? f.count : ''}</div>
              </div>
              <span class="w-8 text-xs text-neutral-500">${f.count}</span>
            </div>`).join('')}
        </div>

        <div class="rounded-xl bg-white border p-5">
          <h2 class="font-semibold text-neutral-900 mb-4">Top referidores</h2>
          <table class="w-full text-sm">
            <thead><tr class="text-xs text-neutral-500 uppercase border-b"><th class="text-left py-2 font-medium">Nombre</th><th class="text-right py-2 font-medium">Ventas</th><th class="text-right py-2 font-medium">Comisión</th><th class="text-right py-2 font-medium">Conv.</th></tr></thead>
            <tbody>
              ${[
                { name: 'María García', sales: 12, commission: '$450', conv: '75%' },
                { name: 'José Hernández', sales: 8, commission: '$312', conv: '62%' },
                { name: 'Ana López', sales: 6, commission: '$225', conv: '50%' },
              ].map(r => `<tr class="border-b border-neutral-50"><td class="py-2.5 font-medium">${r.name}</td><td class="py-2.5 text-right">${r.sales}</td><td class="py-2.5 text-right text-success-600 font-medium">${r.commission}</td><td class="py-2.5 text-right">${r.conv}</td></tr>`).join('')}
            </tbody>
          </table>
          <div class="mt-4 rounded-lg bg-primary-50 border border-primary-200 p-3 text-sm text-primary-800">
            💡 ${Math.random() > 0.5 ? 'María García está a 3 ventas de superar su récord mensual' : 'La campaña "Fibra Enero" tiene 34% más conversión que el promedio'}

        </div>

      <div class="rounded-xl bg-white border p-5">
        <h2 class="font-semibold text-neutral-900 mb-4">Actividad reciente</h2>

              <span class="text-xs text-neutral-400">${a.time}</span>

}

// ─── COMMERCIAL ──────────────────────────────────────────────────────

function renderCommercial() {
  return `

      <p class="text-sm text-neutral-500 mb-6">Administra los planes de internet y políticas de comisión</p>

          { name: 'Fibra 300MB', price: 449, speed: 300, commission: 15, active: true, color: 'bg-primary-500' },

      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="rounded-xl bg-white border p-5">

let catalogStep = 1;
let selectedZoneId = null;
let selectedZoneName = '';
let selectedTechId = null;
let selectedPlan = null;
let catalogPlans = [];
let catalogZones = [];
let clientType = 'ct-residential';
let clientData = {};
let saleStep = 0;

async function loadCatalog() {
  try { catalogZones = await API.getZones() || []; } catch {}
  catalogStep = 1; selectedZoneId = null; selectedTechId = null; selectedPlan = null; catalogPlans = [];
  renderCatalog();
}

function selectZoneV2(id, name) { selectedZoneId = id; selectedZoneName = name; selectedTechId = null; catalogPlans = []; loadPlans(); }
async function selectTechV2(id) { selectedTechId = id; catalogPlans = []; loadPlans(); }

async function loadPlans() {
  const plans = await API.getOffers(selectedZoneId, selectedTechId);
  if (plans) catalogPlans = plans;
  catalogStep = 2;
  renderCatalog();
}

function selectPlan(plan) {
  selectedPlan = plan;
  catalogStep = 3;
  renderCatalog();
}

function setClientType(type) { clientType = type; }
function nextSaleStep() { saleStep++; renderCatalog(); }
function prevSaleStep() { saleStep--; renderCatalog(); }

async function submitSale() {
  const ref = await API.createReferral({ fullName: clientData.name || 'Cliente', phone: clientData.phone || '', planId: selectedPlan?.id });
  if (ref) { saleStep = 99; renderCatalog(); }
}

function getTechClass(code) { return code === 'GPON' ? 'bg-primary-100 text-primary-700 border-primary-300' : 'bg-amber-100 text-amber-700 border-amber-300'; }
function getTechIcon(code) { return code === 'GPON' ? '🔵' : '🟠'; }

async function renderCatalog() {
  if (saleStep === 99) {
    return `
      <div class="p-6 slide-in text-center pt-20">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-2xl font-bold text-neutral-900 mb-2">¡Venta registrada!</h2>
        <p class="text-neutral-500 mb-6">La venta ha sido registrada exitosamente en INTERPLAY</p>
        <div class="max-w-md mx-auto bg-white border rounded-xl p-6 text-left">
          <div class="space-y-3">
            <div class="flex items-center gap-3"><span class="w-2 h-2 rounded-full bg-success-500"></span><span class="text-sm">Plan: ${selectedPlan?.name}</span></div>
            <div class="flex items-center gap-3"><span class="w-2 h-2 rounded-full bg-success-500"></span><span class="text-sm">Zona: ${selectedZoneName}</span></div>
            <div class="flex items-center gap-3"><span class="w-2 h-2 rounded-full bg-success-500"></span><span class="text-sm">Pendiente: validación de cobertura y documentos</span></div>
          </div>
        </div>
        <button onclick="loadCatalog(); saleStep=0; renderCatalog()" class="mt-6 rounded-lg bg-primary-500 text-white px-6 py-2.5 text-sm font-medium hover:bg-primary-600">Volver al catálogo</button>
      </div>`;
  }

  const zonesMap = {};
  catalogZones.forEach(z => {
    if (!zonesMap[z.name]) zonesMap[z.name] = { name: z.name, id: z.zone_id || z.id, technologies: [] };
    zonesMap[z.name].technologies.push({ id: z.technology_id, name: z.technology, code: z.technology_code });
  });
  const zoneList = Object.values(zonesMap);
  const techs = selectedZoneId ? (zoneList.find(z => z.id === selectedZoneId)?.technologies || []) : [];
  const clientTypes = await API.getClientTypes() || [];

  return `
    <div class="p-6 slide-in">
      <div class="flex items-center gap-2 mb-6">
        ${['Zona', 'Plan', 'Cliente', 'Confirmar'].map((s, i) => `
          <div class="flex items-center gap-2 ${i > 0 ? 'ml-2' : ''}">
            <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${catalogStep > i ? 'bg-success-500 text-white' : catalogStep === i + 1 ? 'bg-primary-500 text-white' : 'bg-neutral-200 text-neutral-500'}">${i + 1}</div>

      ` : catalogStep === 3 ? `

            <div class="flex items-center gap-4 text-sm text-neutral-500">
              <span>📍 ${selectedZoneName}</span>
              <span>💰 $${(selectedPlan?.price || 0).toLocaleString('es-CO')}/mes</span>
              <span>🚀 ${selectedPlan?.download_speed} Mbps</span>

          </div>

          <div class="rounded-xl bg-white border p-5 mb-4">
            <h3 class="font-semibold text-neutral-900 mb-4">Tipo de cliente</h3>
            <div class="flex gap-3">
              ${(clientTypes.length > 0 ? clientTypes : [{id:'ct-residential',name:'Residencial',tax_rate:0},{id:'ct-commercial',name:'Comercial',tax_rate:19}]).map(ct => `
                <button class="flex-1 rounded-lg border-2 p-3 text-center transition-all ${clientType === ct.id ? 'border-primary-500 bg-primary-50' : 'hover:border-primary-300'}" onclick="setClientType('${ct.id}')">

                  <p class="text-xs text-neutral-500 mt-1">IVA ${ct.tax_rate}%</p>
                </button>`).join('')}
            </div>
          </div>

          <div class="rounded-xl bg-white border p-5 mb-4">
            <h3 class="font-semibold text-neutral-900 mb-4">Datos del cliente</h3>
            <div class="space-y-3">
              <input placeholder="Nombre completo" class="w-full rounded-lg border border-neutral-300 px-3 py-2.5 text-sm" id="client-name">
              <input placeholder="Teléfono" class="w-full rounded-lg border border-neutral-300 px-3 py-2.5 text-sm" id="client-phone">
              <input placeholder="Correo electrónico (opcional)" class="w-full rounded-lg border border-neutral-300 px-3 py-2.5 text-sm" id="client-email">
              <input placeholder="Dirección" class="w-full rounded-lg border border-neutral-300 px-3 py-2.5 text-sm" id="client-address">
            </div>
          </div>

          <div class="rounded-xl bg-white border p-5 mb-6">
            <h3 class="font-semibold text-neutral-900 mb-3">Documentos requeridos</h3>
            <div class="space-y-2">
              <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rounded accent-primary-500"> Copia de cédula</label>
              <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rounded accent-primary-500"> Fotocopia recibo público</label>
            </div>
          </div>

          <div class="rounded-xl bg-primary-50 border border-primary-200 p-4 mb-6">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-sm text-primary-800 font-medium">Resumen de la venta</p>
                <p class="text-xs text-primary-600 mt-1">IVA: ${clientType === 'ct-residential' ? '0% (Hogar)' : '19% (Comercial)'} · Instalación: 2-3 días hábiles</p>
              </div>
              <div class="text-right">
                <p class="text-lg font-bold text-primary-600">$${(selectedPlan?.price || 0).toLocaleString('es-CO')}</p>
                <p class="text-xs text-primary-500">/mes</p>
              </div>
            </div>
          </div>

          <button onclick="submitSale()" class="w-full rounded-xl bg-success-500 text-white py-3.5 text-base font-semibold hover:bg-success-600 transition-all">
            ✅ Registrar venta
          </button>
        </div>
      ` : ''}
    </div>`;
}

// ─── SEARCH ──────────────────────────────────────────────────────────

function toggleSearch() {
  const modal = document.getElementById('search-modal');
  modal.classList.toggle('hidden');
  modal.classList.toggle('flex');
  if (!modal.classList.contains('hidden')) {
    setTimeout(() => document.getElementById('global-search').focus(), 100);
    renderSearchResults('');
  }
}

function closeSearch(e) {
  if (e.target === e.currentTarget) {
    document.getElementById('search-modal').classList.add('hidden');
    document.getElementById('search-modal').classList.remove('flex');
  }
}

function renderSearchResults(query) {
  const results = document.getElementById('search-results');
  const items = [
    { icon: '👤', text: 'María García — Referidor', type: 'Usuario' },
    { icon: '📡', text: 'Fibra 300MB — Plan', type: 'Plan' },
    { icon: '🔧', text: 'INS-0042 — Instalación', type: 'Instalación' },
    { icon: '💰', text: 'COM-0012 — Comisión \$12.50', type: 'Comisión' },
    { icon: '🏢', text: 'INTERPLAY Telecomunicaciones — Empresa', type: 'Organización' },
    { icon: '🔗', text: 'Google Maps — Integración', type: 'Integración' },
  ];
  results.innerHTML = items.filter(i => !query || i.text.toLowerCase().includes(query.toLowerCase())).map(i => `
    <button class="w-full flex items-center gap-3 rounded-lg px-3 py-2.5 hover:bg-neutral-50 text-left" onclick="document.getElementById('search-modal').classList.add('hidden');document.getElementById('search-modal').classList.remove('flex')">
      <span class="text-lg">${i.icon}</span>
      <div><p class="text-sm font-medium text-neutral-900">${i.text}</p><p class="text-[10px] text-neutral-400">${i.type}</p></div>
    </button>`).join('') || '<p class="text-sm text-neutral-400 p-3 text-center">Sin resultados</p>';
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleSearch(); }
  if (e.key === 'Escape') { document.getElementById('search-modal').classList.add('hidden'); document.getElementById('search-modal').classList.remove('flex'); }
});

// ─── API CLIENT ──────────────────────────────────────────────────────
// Connected to the Cloudflare Workers API when deployed.
// Falls back to mock data when running standalone.

const API = {
  base: 'https://referix-api.reto-diario.workers.dev',
  headers: { 'Content-Type': 'application/json', 'X-Tenant-Id': 'demo-tenant' },

  async get(path) {
    try {
      const res = await fetch(`${this.base}${path}`, { headers: this.headers });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const json = await res.json();
      return json.data;
    } catch (e) {
      console.log(`[API] Fallback para GET ${path}: ${e.message}`);
      return null;
    }
  },

  async post(path, body) {
    try {
      const res = await fetch(`${this.base}${path}`, { method: 'POST', headers: this.headers, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const json = await res.json();
      return json.data;
    } catch (e) {
      console.log(`[API] Fallback para POST ${path}: ${e.message}`);
      return null;
    }
  },

  async fetch(method, path, body) {
    try {
      const res = await fetch(`${this.base}${path}`, { method, headers: this.headers, body: body ? JSON.stringify(body) : undefined });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return (await res.json()).data;
    } catch (e) { console.log(`[API] Fallback ${method} ${path}: ${e.message}`); return null; }
  },
  async login(email, password) {
    return this.post('/api/v1/auth/login', { email, password });
  },

  async getDashboard() {
    return this.get('/api/v1/dashboard');
  },

  async createReferral(data) {
    return this.post('/api/v1/referrals', data);
  },

  async getReferrals(params = {}) {
    const qs = new URLSearchParams(params).toString();
    return this.get(`/api/v1/referrals${qs ? '?' + qs : ''}`);
  },

  async checkCoverage(address, lat, lng) {
    return this.post('/api/v1/coverage/check', { address, latitude: lat, longitude: lng });
  },

  async getCommissions(params = {}) {
    const qs = new URLSearchParams(params).toString();
    return this.get(`/api/v1/commissions${qs ? '?' + qs : ''}`);
  },

  async getWallet(referrerId) {
    return this.get(`/api/v1/wallet?referrerId=${referrerId}`);
  },

  // v2 Catalog
  async getZones() { return this.get('/api/v2/catalog/zones'); },
  async getTechnologies() { return this.get('/api/v2/catalog/technologies'); },
  async getClientTypes() { return this.get('/api/v2/catalog/client-types'); },
  async getPlansByZone(zoneId, techId) {
    return this.get(`/api/v2/catalog/plans?zone_id=${zoneId}${techId ? `&technology_id=${techId}` : ''}`);
  },
  async getPlanDetail(planId) {
    return this.get(`/api/v2/catalog/plan-detail?plan_id=${planId}`);
  },

  // Commercial Engine
  async getOffers(zoneId, techId) {
    return this.get(`/api/v2/engine/offers?zone_id=${zoneId}${techId ? `&technology_id=${techId}` : ''}`);
  },
  async getCommission(planId, offerId) {
    return this.get(`/api/v2/engine/commission?plan_id=${planId}${offerId ? `&offer_id=${offerId}` : ''}`);
  },
  async getProfitability(planId) {
    return this.get(`/api/v2/engine/profitability?plan_id=${planId}`);
  },
  async recommend(devices, useCases) {
    return this.post('/api/v2/engine/recommend', { devices, useCases });
  },
  async simulatePrice(planId, newPrice) {
    return this.post('/api/v2/engine/simulate', { plan_id: planId, new_price: newPrice });
  },

  // Admin
  async adminListPlans() { return this.get('/api/v2/admin/plans'); },
  async adminGetPlan(id) { return this.get(`/api/v2/admin/plans/${id}`); },
  async adminCreatePlan(data) { return this.post('/api/v2/admin/plans', data); },
  async adminUpdatePlan(id, data) { return this.fetch('PUT', `/api/v2/admin/plans/${id}`, data); },
  async adminPublishPlan(id) { return this.post(`/api/v2/admin/plans/${id}/publish`, {}); },
  async adminDuplicatePlan(id) { return this.post(`/api/v2/admin/plans/${id}/duplicate`, {}); },
  async adminListCommissions() { return this.get('/api/v2/admin/commissions'); },
  async adminCreateCommission(data) { return this.post('/api/v2/admin/commissions', data); },
  async adminDeleteCommission(id) { return this.fetch('DELETE', `/api/v2/admin/commissions/${id}`); },
  async comparePlans(planIds) { return this.post('/api/v2/catalog/compare', { planIds }); },
}
};

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  API.getDashboard().then(data => {
    if (data) console.log('[API] Dashboard loaded:', data);
  });
  loadCatalog();
});
