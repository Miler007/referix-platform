<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Referix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#ffffff;border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{width:64px;height:64px;background:#0066FF;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;color:#fff;font-weight:800}
h1{text-align:center;font-size:24px;font-weight:700;color:#111827;margin-bottom:4px}
.sub{text-align:center;font-size:14px;color:#6B7280;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:1.5px solid #D1D5DB;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:#111827}
input:focus{border-color:#0066FF;box-shadow:0 0 0 3px rgba(0,102,255,0.15)}
.form-group{margin-bottom:16px}
.btn{width:100%;padding:14px;background:#0066FF;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.btn:hover{background:#0052CC}
.btn:active{transform:scale(0.98)}
.footer{text-align:center;margin-top:16px;font-size:10px;color:#9CA3AF}
.app-grid{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.app-btn{display:flex;align-items:center;gap:12px;padding:16px;border:2px solid #E5E7EB;border-radius:12px;text-decoration:none;transition:all .2s;background:#fff}
.app-btn:hover{border-color:#0066FF;background:#EFF6FF}
.app-icon{width:48px;height:48px;background:#EFF6FF;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.app-name{font-size:15px;font-weight:600;color:#111827}
.app-desc{font-size:12px;color:#6B7280}
.logout{display:block;margin-top:24px;text-align:center;font-size:13px;color:#9CA3AF;text-decoration:none;cursor:pointer}
.logout:hover{color:#6B7280}
.alert{background:#FEF2F2;color:#DC2626;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API='https://referix-api.reto-diario.workers.dev';
const APPS={
  admin:{name:'Console',path:'/console.html',roles:['ADMIN','SUPERVISOR'],icon:'🏢',desc:'Administración de la empresa'},
  sales:{name:'Sales',path:'/sales.html',roles:['SALES','ASESOR','ADMIN'],icon:'📝',desc:'Registrar ventas en 2 minutos'},
  partner:{name:'Partner',path:'/partner.html',roles:['REFERIDOR'],icon:'🤝',desc:'Comisiones y wallet'},
  operations:{name:'Operations',path:'/ops.html',roles:['TECHNICIAN'],icon:'🔧',desc:'Instalaciones'},
  executive:{name:'Executive',path:'/exec.html',roles:['GERENTE','DIRECTOR','ADMIN'],icon:'📊',desc:'Dashboard ejecutivo'}
};

async function login(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  const alertEl=document.getElementById('alert');
  if(!email||!pass){alertEl.textContent='Ingresa correo y contraseña';alertEl.style.display='block';return;}
  try{
    const r=await fetch(API+'/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(d.errors){alertEl.textContent='Credenciales inválidas';alertEl.style.display='block';return;}
    const user=d.data.user;
    const roles=[user.role];
    renderApps(user,roles);
  }catch(e){alertEl.textContent='Error de conexión al servidor';alertEl.style.display='block';}
}

function renderApps(user,roles){
  const available=Object.entries(APPS).filter(([_,a])=>a.roles.some(r=>roles.includes(r)));
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="logo">R</div>
      <h2 style="font-size:18px">Bienvenido, ${user.name}</h2>
      <p class="sub" style="margin-bottom:8px">Selecciona una aplicación</p>
      <div class="app-grid">${available.map(([k,a])=>`<a href="${a.path}" class="app-btn">
        <div class="app-icon">${a.icon}</div>
        <div><div class="app-name">${a.name}</div><div class="app-desc">${a.desc}</div></div>
      </a>`).join('')}</div>
      <div class="logout" onclick="location.reload()">← Cerrar sesión</div>
    </div>`;
}

document.getElementById('app').innerHTML=`
  <div class="card">
    <div class="logo">R</div>
    <h1>Referix</h1>
    <p class="sub">Inicia sesión para continuar</p>
    <div id="alert" class="alert"></div>
    <div class="form-group"><label>Correo electrónico</label><input id="email" type="email" value="admin@interplay.com"></div>
    <div class="form-group"><label>Contraseña</label><input id="pass" type="password" value="admin123"></div>
    <button class="btn" onclick="login()">Ingresar</button>
    <div class="footer">Demo: admin@interplay.com / admin123</div>
  </div>`;
</script>
</body>
</html>
