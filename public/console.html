<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Referix — Console</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{background:#F8F9FA;color:#111827}
.nav{background:#fff;border-bottom:1px solid #F0F0F0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-l .logo{width:32px;height:32px;background:linear-gradient(135deg,#0066FF,#0052CC);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.nav-l span{font-size:17px;font-weight:700;color:#111827}
.nav-r{display:flex;align-items:center;gap:16px}
.nav-r .ctx{font-size:12px;color:#6B7280}
.nav-r .ctx strong{color:#111827}
.nav-r a{color:#6B7280;text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px}
.nav-r a:hover{background:#F3F4F6}
.container{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:14px;color:#6B7280;margin-bottom:24px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #F0F0F0;border-radius:14px;padding:20px;transition:all .2s}
.kpi:hover{border-color:#D1D5DB;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.kpi .num{font-size:28px;font-weight:800;color:#0066FF;line-height:1.1}
.kpi .num.green{color:#059669}
.kpi .label{font-size:12px;color:#6B7280;margin-top:4px}
.kpi .trend{font-size:11px;margin-top:4px}
.kpi .trend.up{color:#059669}.kpi .trend.down{color:#DC2626}
.card{background:#fff;border:1px solid #F0F0F0;border-radius:14px;padding:20px}
.card h2{font-size:15px;font-weight:600;margin-bottom:16px;color:#111827}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alert-red{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626}
.alert-yellow{background:#FFFBEB;border:1px solid #FDE68A;color:#D97706}
.alert-blue{background:#EFF6FF;border:1px solid #BFDBFE;color:#0066FF}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-primary{background:#0066FF;color:#fff}.btn-primary:hover{background:#0052CC}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #E5E7EB}.btn-outline:hover{background:#F9FAFB}
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.activity-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F3F4F6}
.activity-item:last-child{border-bottom:none}
.activity-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.activity-item .dot.green{background:#10B981}.activity-item .dot.yellow{background:#F59E0B}.activity-item .dot.red{background:#EF4444}
.activity-item .text{flex:1}.activity-item .text .title{font-size:13px;font-weight:500;color:#111827}
.activity-item .text .desc{font-size:11px;color:#6B7280;margin-top:1px}
.activity-item .time{font-size:11px;color:#9CA3AF}
.funnel-stage{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel-stage .label{width:110px;font-size:12px;color:#6B7280;text-align:right;flex-shrink:0}
.funnel-stage .bar{flex:1;height:22px;background:#F3F4F6;border-radius:6px;overflow:hidden}
.funnel-stage .bar-fill{height:100%;background:linear-gradient(90deg,#0066FF,#3B82F6);border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;color:#fff;font-weight:600}
@media(max-width:768px){.grid-4,.grid-2{grid-template-columns:1fr 1fr}.container{padding:16px}.nav-r .ctx{display:none}}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-l"><div class="logo">R</div><span>Console</span></div>
  <div class="nav-r">
    <span class="ctx"><strong>INTERPLAY</strong> · ${new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})}</span>
    <span class="ctx">👤 Admin</span>
    <a href="/">← Salir</a>
  </div>
</div>
<div class="container" id="app">
  <h1>Panel de control</h1>
  <p class="sub">Cargando indicadores...</p>
</div>
<script>
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay'},async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});if(!r.ok)return null;const j=await r.json();return j.data||null}catch(e){return null}}};
async function init(){
  const d=await API.get('/api/v1/dashboard');
  document.getElementById('app').innerHTML=d?renderDashboard(d):renderEmpty();
}
function renderEmpty(){
  return `<p class="sub">INTERPLAY · Resumen ejecutivo · <span style="color:#9CA3AF">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span></p><div class="actions"><a href="/sales.html" class="btn btn-primary">📝 Nueva venta</a><a href="/customer360.html" class="btn btn-outline">👤 Buscar cliente</a></div><div class="card"><p class="text-xs muted">Aún no hay datos disponibles. Cuando comiences a operar, los indicadores aparecerán aquí.</p></div>`;
}
function renderDashboard(d){
  const sales=d?.salesToday||0;
  return `
  <p class="sub">INTERPLAY · Resumen ejecutivo · <span style="color:#9CA3AF">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span></p>
  
  <div class="actions">
    <a href="/sales.html" class="btn btn-primary">📝 Nueva venta</a>
    <a href="/customer360.html" class="btn btn-outline">👤 Buscar cliente</a>
  </div>

  <div class="grid-4">
    <div class="kpi"><div class="num">${sales}</div><div class="label">Ventas del mes</div></div>
    <div class="kpi"><div class="num green">$${((d?.commissionsHeld?.total||0)/1000).toFixed(0)}K</div><div class="label">Comisión pendiente</div><div class="trend up">${d?.commissionsHeld?.count||0} en hold</div></div>
    <div class="kpi"><div class="num">${d?.installationsPending||0}</div><div class="label">Instalaciones pendientes</div></div>
    <div class="kpi"><div class="num">${d?.topReferidors?.length||0}</div><div class="label">Referidores activos</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>📊 Embudo de ventas</h2>
      ${sales>0?`<div class="funnel-stage"><span class="label">Registrados</span><div class="bar"><div class="bar-fill" style="width:100%">${sales}</div></div></div>
      <div class="funnel-stage"><span class="label">Activos</span><div class="bar"><div class="bar-fill" style="width:${d?.conversionRate||75}%">${Math.round(sales*(d?.conversionRate||75)/100)}</div></div></div>
      <div class="funnel-stage"><span class="label">Comisión pagada</span><div class="bar"><div class="bar-fill" style="width:${d?.commissionsHeld?.count?Math.round(d.commissionsHeld.count/sales*100):0}%">${d?.commissionsHeld?.count||0}</div></div></div>`:'<p class="text-xs muted">Registra ventas para ver el embudo.</p>'}
    </div>
    <div class="card">
      <h2>⚠️ Requiere atención</h2>
      ${sales===0?'<div class="alert alert-blue">🔵 Sin alertas. Todos los sistemas operativos.</div>':'<div class="alert alert-blue">🔵 Sin alertas críticas.</div>'}
    </div>
  </div>

  <div class="card">
    <h2>📋 Actividad reciente</h2>
    ${(d?.recentActivity?.length?d.recentActivity:[{event:'Esperando actividad',detail:'No hay eventos recientes aún. Comienza a operar y aquí aparecerán.',time:''}]).map(a=>`<div class="activity-item"><div class="dot green"></div><div class="text"><div class="title">${a.event||a.events||'Actividad'}</div><div class="desc">${a.detail||a.description||''}</div></div><div class="time">${a.time||''}</div></div>`).join('')}
  </div>`;
}
init();
</script>
</body>
</html>
