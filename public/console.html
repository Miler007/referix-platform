<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Referix — Console</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/icons.js"></script>
<style>
:root{--primary:#0066FF;--primary-dark:#0047B3;--primary-light:#EFF6FF;--success:#059669;--warning:#D97706;--danger:#DC2626;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 40px rgba(0,0,0,.08);--transition:all .2s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{background:#F0F2F5;color:var(--gray-900);display:flex;min-height:100vh;font-feature-settings:'cv02','cv03','cv04','cv11'}
::selection{background:var(--primary);color:#fff}
/* Sidebar Premium */
.sidebar{width:260px;background:#0F172A;display:flex;flex-direction:column;flex-shrink:0;position:relative}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06),transparent)}
.sidebar-header{padding:24px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-header .logo{width:34px;height:34px;background:linear-gradient(135deg,#0066FF,#7C3AED);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;box-shadow:0 4px 12px rgba(0,102,255,.3)}
.sidebar-header span{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-header span small{font-weight:400;color:rgba(255,255,255,.4);font-size:11px;display:block;margin-top:-1px}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:var(--transition);margin-bottom:2px;letter-spacing:-.1px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}.nav-item.active{background:rgba(0,102,255,.15);color:#60A5FA;font-weight:600}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:rgba(255,255,255,.3)}
.sidebar-footer a{color:rgba(255,255,255,.4);text-decoration:none;transition:var(--transition)}
.sidebar-footer a:hover{color:rgba(255,255,255,.7)}
/* Main Premium */
.main{flex:1;overflow-y:auto;background:#F0F2F5}
.main-header{background:rgba(255,255,255,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.04);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.main-header .notif-bell svg{width:18px;height:18px}
.main-header h1{font-size:20px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--gray-900),var(--gray-600));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.notif-bell{position:relative;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:var(--transition);color:var(--gray-400);flex-shrink:0}
.notif-bell:hover{background:var(--gray-100);color:var(--gray-600)}.notif-bell svg{width:18px;height:18px}
.kpi-icon svg{width:22px;height:22px}
.activity-item .svg-icon svg{width:16px;height:16px}
.main-header .sub{font-size:12px;color:var(--gray-400)}
.main-header .sub span{color:var(--gray-600)}
.content{padding:28px;max-width:1280px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Cards Premium */
.card{background:#fff;border:1px solid rgba(0,0,0,.04);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);transition:var(--transition)}
.card:hover{box-shadow:var(--shadow-lg)}
.card h2{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--gray-900);letter-spacing:-.2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid rgba(0,0,0,.04);border-radius:14px;padding:20px;box-shadow:var(--shadow);transition:var(--transition)}
.kpi:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.kpi .num{font-size:28px;font-weight:800;color:var(--primary);line-height:1.1;letter-spacing:-.5px}
.kpi .label{font-size:11px;color:var(--gray-400);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
/* Buttons Premium */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:var(--transition);letter-spacing:-.1px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 2px 8px rgba(0,102,255,.2)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(0,102,255,.3);transform:translateY(-1px)}
.btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200)}
.btn-outline:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-success{background:linear-gradient(135deg,#059669,#047857);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.2)}
.btn-success:hover{box-shadow:0 4px 16px rgba(5,150,105,.3);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff}
/* Tables Premium */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th{text-align:left;padding:12px 14px;font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--gray-100);background:var(--gray-50)}
th:first-child{border-radius:10px 0 0 0}th:last-child{border-radius:0 10px 0 0}
td{padding:12px 14px;border-bottom:1px solid var(--gray-50);color:var(--gray-700);transition:var(--transition)}
tr:hover td{background:var(--gray-50)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.2px}
.badge-green{background:#ECFDF5;color:#059669}.badge-yellow{background:#FFFBEB;color:#D97706}.badge-blue{background:#EFF6FF;color:#0066FF}
/* Inputs Premium */
input,select{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:var(--transition);background:#fff}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
/* Modal Premium */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease}
.modal-content{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.15);animation:scaleIn .25s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-content h2{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}
  @media(max-width:768px){
    .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:101;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 0 60px rgba(0,0,0,.2)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-backdrop{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4)}
    .sidebar.open ~ .sidebar-backdrop{display:block}
    .menu-toggle{display:flex!important}
    .grid-4{grid-template-columns:1fr 1fr}.grid-2,.grid-3{grid-template-columns:1fr}
    .content{padding:16px}
  }
  .menu-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:var(--gray-100);border-radius:10px;cursor:pointer;font-size:18px;margin-right:12px;flex-shrink:0;transition:var(--transition)}
  .menu-toggle:hover{background:var(--gray-200)}
  .svg-icon,.nav-item svg{width:18px;height:18px;flex-shrink:0}
</style>
</head>
<body>
  <div class="sidebar">
  <div class="sidebar-header"><div class="logo">R</div><span>Console<small>INTERPLAY</small></span></div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
  <div class="sidebar-footer"><script>document.write(icn('back',14))</script><a href="/"> Salir</a></div>
</div>
<div class="sidebar-backdrop" onclick="document.querySelector('.sidebar').classList.remove('open')"></div>
<div class="main">
  <div class="main-header">
    <div style="display:flex;align-items:center">
      <button class="menu-toggle" id="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
      <div><h1 id="page-title">Dashboard</h1><span class="sub" id="page-sub">INTERPLAY · <span id="fecha-header"></span></span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="notif-bell" onclick="toggleNotif()" title="Notificaciones">
        <script>document.write(ICON.bell)</script>
        <span id="notif-badge" style="display:none;position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:#DC2626;border:2px solid #fff;border-radius:50%;font-size:8px;font-weight:700;color:#fff;align-items:center;justify-content:center"></span>
      </div>
      <div id="notif-dropdown" style="display:none;position:absolute;top:52px;right:20px;width:320px;background:#fff;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.12);z-index:50;overflow:hidden;max-height:400px;overflow-y:auto;border:1px solid var(--gray-100)"></div>
      <span id="user-badge" style="font-size:12px;color:var(--gray-400);font-weight:500"></span>
      <a href="/sales.html" class="btn btn-primary" style="padding:8px 14px;font-size:12px"><script>document.write(icn('sales',14))</script> Nueva venta</a>
    </div>
  </div>
  <div class="content" id="app"></div>
</div>

<script>
const _user=JSON.parse(localStorage.getItem('referix_user')||'{}');
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay','X-User-Id':_user.id||''},
  async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async post(p,b){try{const r=await fetch(this.base+p,{method:'POST',headers:this.headers,body:JSON.stringify(b)});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async put(p,b){try{const r=await fetch(this.base+p,{method:'PUT',headers:this.headers,body:JSON.stringify(b)});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async del(p){try{const r=await fetch(this.base+p,{method:'DELETE',headers:this.headers});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}}};

let currentModule='dashboard';
document.getElementById('fecha-header').textContent=new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});document.getElementById('user-badge').textContent=_user.name||'Admin';

async function loadModule(mod){
  currentModule=mod;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const active=document.querySelector(`.nav-item[data-mod="${mod}"]`);
  if(active)active.classList.add('active');
  const titles={dashboard:'Dashboard',catalog:'Catálogo de Planes',users:'Usuarios',commissions:'Comisiones',coverage:'Cobertura',payouts:'Pagos Solicitados',data:'Base de Datos',backups:'Backups'};
  document.getElementById('page-title').textContent=titles[mod]||'Dashboard';
  const el=document.getElementById('app');
  if(mod==='dashboard')el.innerHTML=await renderDashboard();
  else if(mod==='catalog')el.innerHTML=await renderCatalog();
  else if(mod==='users')el.innerHTML=await renderUsers();
  else if(mod==='commissions')el.innerHTML=await renderCommissions();
  else if(mod==='coverage')el.innerHTML=await renderCoverage();
  else if(mod==='payouts')el.innerHTML=await renderPayouts();
  else if(mod==='data')el.innerHTML=await renderData();
  else if(mod==='backups')el.innerHTML=renderBackups();
}

// ── Build sidebar nav ─────────────────────────────────────────
const NAV_ITEMS=[{mod:'dashboard',icon:'chart',label:'Dashboard'},{mod:'catalog',icon:'package',label:'Catálogo'},{mod:'users',icon:'users',label:'Usuarios'},{mod:'commissions',icon:'money',label:'Comisiones'},{mod:'coverage',icon:'location',label:'Cobertura'},{mod:'payouts',icon:'card',label:'Pagos'},{mod:'data',icon:'database',label:'Datos'},{mod:'backups',icon:'download',label:'Backups'}];
document.getElementById('sidebar-nav').innerHTML=NAV_ITEMS.map(n=>`<div class="nav-item${n.mod==='dashboard'?' active':''}" data-mod="${n.mod}">${icon(n.icon,'',16)} ${n.label}</div>`).join('');

// ── Event listeners ─────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',function(){loadModule(this.dataset.mod);if(window.innerWidth<=768)document.querySelector('.sidebar').classList.remove('open');});
});

// ── DASHBOARD ──────────────────────────────────────────────────
async function renderDashboard(){
  const d=await API.get('/api/v1/dashboard');
  const db=await API.get('/api/v1/admin/db-status');
  const totalReg=db?db.reduce((s,t)=>s+(t.rows||0),0):0;
  const totalComms=d?.commissionsHeld?.total||0;
  const sales=d?.salesToday||0;
  const activity=d?.recentActivity||[];
  return `<div class="grid-4">
    <div class="kpi"><div class="num" style="color:#059669">${sales}</div><div class="label">Ventas hoy</div></div>
    <div class="kpi"><div class="num" style="color:#D97706">$${totalComms.toLocaleString('es-CO')}</div><div class="label">Comisiones pendientes</div></div>
    <div class="kpi"><div class="num">${d?.installationsPending||0}</div><div class="label">Instalaciones pendientes</div></div>
    <div class="kpi"><div class="num">${totalReg}</div><div class="label">Registros en DB</div></div>
  </div>
  <div class="grid-2">
    <div class="card" style="padding:20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:14px">${ICON.bolt}</div>
        <span style="font-size:13px;font-weight:600;color:var(--gray-900);letter-spacing:-.2px">Acciones rápidas</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <a href="/sales.html" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:12px;text-decoration:none;transition:var(--transition);box-shadow:0 2px 8px rgba(0,102,255,.15)">
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center">${ICON.sales||icn('sales',16)}</div>
          <span style="font-size:11px;font-weight:600">Nueva venta</span>
        </a>
        <a href="/customer360.html" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;text-decoration:none;transition:var(--transition);color:var(--gray-700)">
          <div style="width:32px;height:32px;border-radius:8px;background:var(--gray-50);display:flex;align-items:center;justify-content:center;color:var(--primary)">${ICON.customer||icn('customer',16)}</div>
          <span style="font-size:11px;font-weight:600">Buscar cliente</span>
        </a>
        <button onclick="loadModule('catalog')" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;cursor:pointer;transition:var(--transition);color:var(--gray-700);font-family:inherit">
          <div style="width:32px;height:32px;border-radius:8px;background:var(--gray-50);display:flex;align-items:center;justify-content:center;color:var(--warning)">${ICON.package||icn('package',16)}</div>
          <span style="font-size:11px;font-weight:600">Catálogo</span>
        </button>
        <button onclick="loadModule('data')" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;cursor:pointer;transition:var(--transition);color:var(--gray-700);font-family:inherit">
          <div style="width:32px;height:32px;border-radius:8px;background:var(--gray-50);display:flex;align-items:center;justify-content:center;color:var(--gray-500)">${ICON.database||icn('database',16)}</div>
          <span style="font-size:11px;font-weight:600">Datos</span>
        </button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--gray-50);display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:14px">${ICON.bolt}</div>
        <span style="font-size:13px;font-weight:600;color:var(--gray-900);letter-spacing:-.2px">Actividad</span>
        <span style="margin-left:auto;font-size:10px;color:var(--gray-400);font-weight:500">${activity.length} eventos</span>
      </div>
      <div style="padding:4px 20px">
      ${activity.length===0?'<div style="padding:20px;text-align:center;font-size:12px;color:var(--gray-400)">Sin actividad reciente</div>':
      activity.map((a,i)=>{
        let label=a.event||'',ico=icon('pin','',16),color='#0066FF',bg='#EFF6FF';
        try{const p=JSON.parse(a.payload||'{}');
          if(a.event==='COMMISSION_CREATED'){label=(p.planName||'')+' · '+(p.clientName||'');ico=icon('money','',16);color='#059669';bg='#ECFDF5';}
          else if(a.event==='INVOICE_PAID'){label='Factura pagada';ico=icon('check','',16);color='#059669';bg='#ECFDF5';}
          else if(a.event==='COMMISSION_PAID'){label='Comisión pagada';ico=icon('card','',16);color='#0066FF';bg='#EFF6FF';}
        }catch(e){}
        return '<div class="activity-item" style="display:flex;align-items:center;gap:12px;padding:10px 0;'+(i<activity.length-1?'border-bottom:1px solid var(--gray-50)':'')+'"><div style="width:32px;height:32px;border-radius:10px;background:'+bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:'+color+'">'+ico+'</div><div style="flex:1;min-width:0"><p style="font-size:12px;font-weight:500;color:var(--gray-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.1px">'+label+'</p><p style="font-size:10px;color:var(--gray-400);margin-top:1px">'+(a.time?new Date(a.time+'Z').toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'')+'</p></div></div>';
      }).join('')}
      </div>
    </div>
    </div>
  </div>`;
}

// ── CATALOG ────────────────────────────────────────────────────
async function renderCatalog(){
  const plans=await API.get('/api/v2/admin/plans')||[];
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <p style="font-size:13px;color:#6B7280">${plans.length} planes en catálogo</p>
    <button class="btn btn-primary" onclick="showAddPlan()">${icn('plus',14)} Nuevo plan</button>
  </div>
  <div class="card" style="overflow-x:auto">
    <table>
      <tr><th>Nombre</th><th>Zona</th><th>Velocidad</th><th>Precio</th><th>TV</th><th>Estado</th><th>Acciones</th></tr>
      ${plans.length===0?'<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:20px">No hay planes en el catálogo</td></tr>':
      plans.map(p=>{
        const hasTv=p.has_tv==1||p.has_tv=='1'||(p.benefits||'').includes('TV');
        return `<tr><td><strong>${p.name}</strong></td><td style="font-size:11px">${p.zone_name||'—'}</td><td>${p.download_speed} Mbps</td><td>$${(p.price||0).toLocaleString('es-CO')}</td>
        <td>${hasTv?'<span class="badge badge-green">'+icn('check',14)+'</span>':'<span class="badge" style="background:#F3F4F6">'+icn('close',14)+'</span>'}</td>
        <td><span class="badge ${p.status==='PUBLISHED'?'badge-green':'badge-yellow'}">${p.status||'DRAFT'}</span></td>
        <td><button class="btn btn-outline" style="padding:4px 8px;font-size:11px" onclick="editPlan('${p.id}','${(p.name||'').replace(/'/g,"\\'")}',${p.price||0},${p.download_speed||0})">${icn('edit',14)}</button> <button class="btn btn-outline" style="padding:4px 8px;font-size:11px;color:#DC2626;border-color:#FECACA" onclick="deletePlan('${p.id}','${(p.name||'').replace(/'/g,"\\'")}')">${icn('trash',14)}</button></td></tr>`;
      }).join('')}
    </table>
  </div>`;
}
function editPlan(id,name,price,speed){

}

// ── DATA BROWSER ──────────────────────────────────────────────
const TABLE_ICONS = {catalog_plans:'package',referrals:'customer',commissions:'money',users:'users',coverage_zones:'location',subscriptions:'document',installations:'settings',invoices:'card',payments:'card',events:'bolt',wallets:'card',wallet_transactions:'card',plan_services:'document',plan_equipment:'settings',plan_documents:'document',plan_commissions:'money',persons:'customer',referidors:'partner',tenants:'globe'};
async function renderData(){
  const tables=await API.get('/api/v1/admin/db-status');
  if(!tables||tables.length===0)return '<p class="text-xs muted">No se pudo cargar la información de la base de datos</p>';
  const totalRows=tables.reduce((s,t)=>s+(t.rows||0),0);
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <p style="font-size:13px;color:var(--gray-500)">${tables.length} tablas · ${totalRows.toLocaleString()} registros</p>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:20px">
    ${tables.map(t=>{
      const ico=TABLE_ICONS[t.table]||'database';
      const label=t.table.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
      return `<div style="background:#fff;border:1px solid var(--gray-100);border-radius:12px;padding:16px;cursor:pointer;box-shadow:var(--shadow);transition:var(--transition)" onclick="showTableData('${t.table}')">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:10px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;color:var(--primary);flex-shrink:0">${icon(ico,'',18)}</div>
          <div><p style="font-size:13px;font-weight:600;color:var(--gray-800)">${label}</p><p style="font-size:11px;color:var(--gray-400)">${t.rows} registros</p></div>
        </div>
      </div>`;
    }).join('')}
  </div>
  <div id="table-data"></div>`;
}
let selectedIds = new Set();
async function showTableData(table){
  selectedIds.clear();
  const el=document.getElementById('table-data');
  el.innerHTML='<p class="text-xs muted" style="padding:12px">Cargando...</p>';
  const data=await API.get('/api/v1/admin/table-data?table='+table);
  if(!data||data.length===0){el.innerHTML='<div class="card"><p class="text-xs muted" style="padding:24px;text-align:center">Tabla vacía · Sin registros</p></div>';return;}
  const cols=Object.keys(data[0]);
  const displayData=data.slice(0,50);
  el.innerHTML=`<div class="card" style="padding:0;overflow:hidden;margin-top:8px">
    <div style="padding:14px 20px;border-bottom:1px solid var(--gray-50);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <p style="font-size:12px;color:var(--gray-400)">${data.length} registros · <strong>${table.replace(/_/g,' ')}</strong></p>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-outline" style="padding:4px 10px;font-size:10px;color:#DC2626;border-color:#FECACA" onclick="deleteSelected('${table}')" id="btn-delete-selected" disabled>${icn('trash',12)} Eliminar seleccionados (<span id="selected-count">0</span>)</button>
        ${table==='referrals'?`<button class="btn btn-outline" style="padding:4px 10px;font-size:10px;color:#DC2626;border-color:#FECACA" onclick="clearTestData()">${icn('trash',12)} Limpiar</button>`:''}
      </div>
    </div>
    <div style="overflow-x:auto">
    <table style="font-size:11px;border-collapse:separate;border-spacing:0">
      <thead><tr style="background:linear-gradient(135deg,#F8FAFC,#F1F5F9)">${cols.map((c,i)=>'<th style="padding:10px 12px;font-size:9px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--gray-200);white-space:nowrap;'+(i===0?'padding-left:8px;width:30px':'')+'">'+(i===0?('<input type="checkbox" onchange="toggleAll(this,\''+table+'\')" style="width:14px;height:14px;cursor:pointer;accent-color:var(--primary)">'):c.replace(/_/g,' '))+'</th>').join('')}<th style="padding:10px 12px;font-size:9px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--gray-200);width:80px">Acción</th></tr></thead>
      <tbody>${displayData.map((r,idx)=>{
        const rid=r.id||'';
        const bg=idx%2===0?'#fff':'var(--gray-50)';
        return '<tr style="background:'+bg+';transition:var(--transition)" onmouseover="this.style.background=\'#EFF6FF\'" onmouseout="this.style.background=\''+bg+'\'" id="row-'+rid+'"><td style="padding:8px 12px;border-bottom:1px solid var(--gray-100)"><input type="checkbox" value="'+rid+'" onchange="selectRow(this,\''+table+'\')" style="width:14px;height:14px;cursor:pointer;accent-color:var(--primary)"></td>'+cols.map(c=>{
          const val=r[c]??'—';
          const isLong=String(val).length>40;
          const display=String(val).substring(0,40)+(isLong?'…':'');
          const isId=c==='id'||c==='tenant_id';
          return '<td style="padding:8px 12px;border-bottom:1px solid var(--gray-100);font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:'+(isId?'var(--gray-400)':'var(--gray-700)')+';'+(c==='value'||c==='price'||c==='amount'?'font-weight:600;font-variant-numeric:tabular-nums':'')+'" title="'+String(val).replace(/"/g,'&quot;')+'">'+display+'</td>';
        }).join('')+'<td style="padding:8px 12px;border-bottom:1px solid var(--gray-100);white-space:nowrap"><button class="btn btn-outline" style="padding:3px 6px;font-size:9px;border-radius:6px" onclick="editTableRow(\''+table+'\',\''+rid+'\')">'+icn('edit',11)+'</button> <button class="btn btn-outline" style="padding:3px 6px;font-size:9px;border-radius:6px;color:#DC2626;border-color:#FECACA" onclick="deleteTableRow(\''+table+'\',\''+rid+'\')">'+icn('trash',11)+'</button></td></tr>';
      }).join('')}</tbody>
    </table>
    </div>
    ${data.length>50?'<div style="padding:10px;text-align:center;font-size:11px;color:var(--gray-400)">Mostrando 50 de '+data.length+' registros</div>':''}
  </div>`;
}
function toggleAll(el,table){
  document.querySelectorAll('#table-data input[type="checkbox"]').forEach(cb=>{
    if(cb!==el){cb.checked=el.checked;if(el.checked)selectedIds.add(cb.value);else selectedIds.delete(cb.value);}
  });
  document.getElementById('selected-count').textContent=selectedIds.size;
  document.getElementById('btn-delete-selected').disabled=selectedIds.size===0;
}
function selectRow(el){
  if(el.checked)selectedIds.add(el.value);else selectedIds.delete(el.value);
  document.getElementById('selected-count').textContent=selectedIds.size;
  document.getElementById('btn-delete-selected').disabled=selectedIds.size===0;
}
async function deleteSelected(table){
  if(selectedIds.size===0)return;
  if(!confirm('¿Eliminar '+selectedIds.size+' registro(s) seleccionados?'))return;
  const ids=[...selectedIds];
  let ok=true;
  for(const id of ids){
    const r=await API.del('/api/v1/admin/table-data/'+table+'/'+id);
    if(!r)ok=false;
  }
  if(ok)showTableData(table);else alert('Error al eliminar algunos registros');
}
async function editTableRow(table,id){
  const data=await API.get('/api/v1/admin/table-data?table='+table);
  const row=data?.find((r)=>r.id===id);
  if(!row)return alert('Registro no encontrado');
  const cols=Object.keys(row).filter(k=>k!=='rowid');
  let fields=cols.map(c=>{
    const val=row[c]??'';
    return `<label style="font-size:11px;font-weight:600;color:var(--gray-500);margin-top:6px">${c.replace(/_/g,' ')}</label>
    <input id="edit-field-${c}" value="${String(val).replace(/"/g,'&quot;')}" ${c==='id'||c==='tenant_id'?'readonly style="background:var(--gray-50);color:var(--gray-400)"':''}>`;
  }).join('');
  document.getElementById('app').innerHTML+=`<div class="modal" onclick="if(event.target===this)this.remove()">
    <div class="modal-content">
      <h2>${icn('edit',16)} Editar ${table.replace(/_/g,' ')}</h2>
      <p style="font-size:11px;color:var(--gray-400);margin-bottom:12px">ID: ${id}</p>
      <div style="max-height:50vh;overflow-y:auto;padding-right:4px">${fields}</div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="saveTableRow('${table}','${id}')">Guardar</button>
        <button class="btn btn-outline" onclick="this.closest('.modal').remove()">Cancelar</button>
      </div>
    </div>
  </div>`;
}
async function saveTableRow(table,id){
  const data=await API.get('/api/v1/admin/table-data?table='+table);
  const row=data?.find((r)=>r.id===id);
  if(!row)return alert('Registro no encontrado');
  const cols=Object.keys(row).filter(k=>k!=='rowid'&&k!=='id');
  const body = {};
  for (const c of cols) {
    const el=document.getElementById('edit-field-'+c);
    if(el) body[c]=el.value;
  }
  const r=await API.put('/api/v1/admin/table-data/'+table+'/'+id,body);
  if(r){document.querySelector('.modal')?.remove();showTableData(table);}
  else alert('Error al guardar');
}
async function clearTestData(){
  if(!confirm('¿Eliminar TODOS los registros de prueba (clientes en estado NEW)?'))return;
  const r=await API.del('/api/v1/admin/referrals/clear-test');
  if(r)showTableData('referrals');
}
async function deleteTableRow(table,id){
  if(!confirm('¿Eliminar '+table.replace(/_/g,' ')+' '+id.slice(0,12)+'...?'))return;
  const r=await API.del('/api/v1/admin/table-data/'+table+'/'+id);
  if(r)showTableData(table);
  else alert('Error al eliminar');
}

// ── NOTIFICATIONS ────────────────────────────────────────────
let notifOpen=false;
let notifCount=0;
async function checkNotifs(){
  const payouts=await API.get('/api/v1/admin/payouts');
  const count=payouts?.length||0;
  const badge=document.getElementById('notif-badge');
  if(count>0){badge.style.display='flex';badge.textContent=count>9?'9+':count;}else{badge.style.display='none';}
  notifCount=count;
  // Browser notification
  if(count>0 && document.hidden && Notification.permission==='granted'){
    new Notification('💰 Nueva solicitud de pago',{body:`${count} solicitud(es) pendiente(s)`,icon:'/icon.svg'});
  }
}
function toggleNotif(){
  const dd=document.getElementById('notif-dropdown');
  notifOpen=!notifOpen;
  if(!notifOpen){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML='<div style="padding:14px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--gray-50)">Notificaciones</div>';
  if(notifCount===0){dd.innerHTML+='<div style="padding:24px;text-align:center;font-size:12px;color:var(--gray-400)">Sin notificaciones</div>';return;}
  dd.innerHTML+=`<div style="padding:12px 16px;display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:#FEF2F2;display:flex;align-items:center;justify-content:center">💰</div><div><p style="font-size:12px;font-weight:500">${notifCount} solicitud(es) de pago</p><p style="font-size:10px;color:var(--gray-400)">Revisa en 💳 Pagos</p></div></div>`;
}
// Request notification permission and start polling
if('Notification'in window && Notification.permission==='default')Notification.requestPermission();
checkNotifs();
setInterval(checkNotifs,30000); // cada 30s

// ── Payout badge ──────────────────────────────────────────────
async function updatePayoutBadge(){
  const payouts=await API.get('/api/v1/admin/payouts');
  const count=payouts?.length||0;
  const el=document.querySelector('[data-mod="payouts"]');
  if(el){
    const label=NAV_ITEMS.find(n=>n.mod==='payouts')?.label||'Pagos';
    el.innerHTML=`${icon('card','',16)} ${label}${count>0?` <span style="background:#DC2626;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;line-height:1.4;margin-left:auto">${count}</span>`:''}`;
  }
}
// Override loadModule to update badge after rendering payouts
const _origLoad=loadModule;
loadModule=async function(mod){
  await _origLoad(mod);
  if(mod!=='payouts')updatePayoutBadge();
};

// ── Init ──────────────────────────────────────────────────────
loadModule('dashboard');
updatePayoutBadge();
</script>
</body>
