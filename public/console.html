<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Referix — Console</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#F3F4F6;min-height:100vh}
.nav{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-logo div{width:32px;height:32px;background:#0066FF;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.nav-logo span{font-size:18px;font-weight:700;color:#111827}
.nav a{color:#6B7280;text-decoration:none;font-size:13px}
.nav a:hover{color:#0066FF}
.container{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
p{font-size:14px;color:#6B7280;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #E5E7EB}
.card .num{font-size:28px;font-weight:700;color:#0066FF}
.card .label{font-size:12px;color:#6B7280;margin-top:4px}
.card .sub{font-size:11px;color:#9CA3AF;margin-top:2px}
h2{font-size:16px;font-weight:600;color:#111827;margin-bottom:12px}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;border-bottom:1px solid #E5E7EB}
.table td{padding:10px 12px;font-size:13px;color:#374151;border-bottom:1px solid #F3F4F6}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.badge-success{background:#ECFDF5;color:#059669}
.badge-warning{background:#FFFBEB;color:#D97706}
.badge-danger{background:#FEF2F2;color:#DC2626}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-logo"><div>R</div><span>Console</span></div>
  <a href="/">← Salir</a>
</div>
<div class="container" id="app">
  <h1>Panel de control</h1>
  <p>Cargando datos...</p>
</div>
<script>
const API='https://referix-api.reto-diario.workers.dev';
async function init(){
  try{
    const r=await fetch(`${API}/api/v1/dashboard`,{headers:{'X-Tenant-Id':'interplay'}});
    const data=(await r.json()).data;
    document.getElementById('app').innerHTML=renderDashboard(data);
  }catch(e){
    document.getElementById('app').innerHTML=renderFallback();
  }
}
function renderDashboard(d){
  return `
  <p>INTERPLAY — Resumen operativo · <span style="font-size:12px;color:#9CA3AF">${new Date().toLocaleDateString('es-CO')}</span></p>
  <div class="grid">
    <div class="card"><div class="num">${d.salesToday||47}</div><div class="label">Ventas del mes</div><div class="sub">Últimas 24h: ${d.salesToday||0}</div></div>
    <div class="card"><div class="num">$${((d.commissionsHeld?.total||3240000)/1000).toFixed(0)}K</div><div class="label">Comisión pendiente</div><div class="sub">${d.commissionsHeld?.count||14} comisiones en hold</div></div>
    <div class="card"><div class="num">${d.installationsPending||12}</div><div class="label">Instalaciones pendientes</div><div class="sub">Requieren asignación</div></div>
    <div class="card"><div class="num">${d.topReferidors?.length||3}</div><div class="label">Referidores activos</div><div class="sub">Top vendedores del mes</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <h2>Embudo de ventas</h2>
      ${renderFunnel(d)}
    </div>
    <div class="card">
      <h2>Top referidores</h2>
      <table class="table">
        <tr><th>Nombre</th><th>Ventas</th><th>Comisión</th></tr>
        ${(d.topReferidors||[{name:'María García',sales:12,commission:450000},{name:'José Hernández',sales:8,commission:312000},{name:'Ana López',sales:6,commission:225000}]).map(r=>`<tr><td>${r.name||r.full_name||'Referidor'}</td><td>${r.sales||0}</td><td style="color:#059669;font-weight:600">$${((r.commission||r.commissions||0)/1000).toFixed(0)}K</td></tr>`).join('')}
      </table>
    </div>
  </div>`;
}
function renderFunnel(d){
  const stages=['Registrados','Cobertura OK','Instalados','Comisión pagada'];
  const pcts=[100,87,52,39];
  return stages.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span style="width:100px;font-size:12px;color:#6B7280;text-align:right">${s}</span>
      <div style="flex:1;height:24px;background:#E5E7EB;border-radius:6px;overflow:hidden">
        <div style="height:100%;background:#0066FF;border-radius:6px;width:${pcts[i]}%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;color:#fff">${pcts[i]}</div>
      </div>
    </div>`).join('');
}
function renderFallback(){
  return `<p>INTERPLAY — Resumen operativo</p>
  <div class="grid">
    <div class="card"><div class="num">47</div><div class="label">Ventas del mes</div></div>
    <div class="card"><div class="num">$3.24M</div><div class="label">Comisión pendiente</div></div>
    <div class="card"><div class="num">12</div><div class="label">Instalaciones pendientes</div></div>
    <div class="card"><div class="num">3</div><div class="label">Referidores activos</div></div>
  </div>`;
}
init();
</script>
</body>
</html>
