<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Referix — Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>:root{--primary:#0066FF;--primary-dark:#0047B3;--success:#059669;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--transition:all .25s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{background:var(--gray-50);color:var(--gray-900);font-feature-settings:'cv02','cv03','cv04','cv11'}
::selection{background:var(--primary);color:#fff}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 0 60px rgba(0,0,0,.04)}
.px-4{padding-left:20px;padding-right:20px}.py-5{padding-top:24px;padding-bottom:24px}.py-8{padding-top:32px;padding-bottom:32px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mt-4{margin-top:16px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-1{flex:1}.gap-2{gap:8px}.gap-3{gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.text-xs{font-size:12px;color:var(--gray-400)}.text-sm{font-size:14px;color:var(--gray-500)}.text-lg{font-size:18px;font-weight:700;letter-spacing:-.3px}
.text-xl{font-size:22px;font-weight:700;letter-spacing:-.3px}.text-2xl{font-size:26px;font-weight:800;letter-spacing:-.5px}.text-3xl{font-size:32px;font-weight:800;letter-spacing:-.5px}
.text-center{text-align:center}.font-bold{font-weight:700}.font-semibold{font-weight:600}
.w-full{width:100%}.card{background:#fff;border:1px solid var(--gray-100);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:var(--transition)}.card:hover{box-shadow:var(--shadow-lg)}
.shadow{box-shadow:var(--shadow-lg)}
.primary{color:var(--primary)}.success{color:var(--success)}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:var(--transition);letter-spacing:-.2px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px rgba(0,102,255,.2)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(0,102,255,.3);transform:translateY(-1px)}
.btn-outline{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200)}.btn-outline:hover{background:var(--gray-50)}
.btn-success{background:linear-gradient(135deg,var(--success),#047857);color:#fff;box-shadow:0 4px 16px rgba(5,150,105,.2)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.animate-fadeUp{animation:fadeUp .35s ease-out}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.15);animation:scaleIn .25s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-content h2{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
input,select{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif;margin-bottom:10px;transition:var(--transition)}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
label{display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:4px}
</style>
</head>
<body>
<div id="app" class="animate-fadeUp"></div>
<script src="/icons.js"></script>
<script>
const _user=JSON.parse(localStorage.getItem('referix_user')||'{}');
const API={base:'https://referix-api.reto-diario.workers.dev',headers:{'Content-Type':'application/json','X-Tenant-Id':'interplay','X-User-Id':_user.id||''},
  async get(p){try{const r=await fetch(this.base+p,{headers:this.headers});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}},
  async post(p,b){try{const r=await fetch(this.base+p,{method:'POST',headers:this.headers,body:JSON.stringify(b)});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}}};
const userName=_user.name||'Usuario';
let wallet=null,page='dashboard',userId=null;

(async()=>{
  const users=await API.get('/api/v1/users');
  const me=users?.find(u=>u.email===_user.email);
  userId=me?.id||'';
  wallet=await API.get('/api/v1/wallet?referrerId='+userId);
  render();
})();

function render(){
  document.getElementById('app').innerHTML={
    dashboard:renderDashboard,
    wallet:renderWallet,
  }[page]()||renderDashboard();
}
function formatCOP(n){return (n||0).toLocaleString('es-CO')}

function renderDashboard(){
  const b=wallet?.balance||0,pnd=wallet?.pendingBalance||0,earned=wallet?.totalEarned||0;
  const pm=wallet?.payoutMethod||{};
  const hasMethod=pm.method==='BANK'||pm.method==='NEQUI';
  return `<div class="px-4 py-5 animate-fadeUp">
    <div class="flex items-center gap-3 mb-6">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0066FF,#0052CC);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700">${userName[0]||'R'}</div>
      <div><p class="text-lg">${userName}</p><p class="text-xs" style="color:#9CA3AF">Referidor INTERPLAY</p></div>
    </div>
    <div class="card shadow mb-4" style="background:linear-gradient(135deg,#0066FF,#003DA6);color:#fff;border:none">
      <p class="text-xs" style="opacity:.8">Saldo disponible</p>
      <p class="text-3xl font-bold" style="margin:4px 0">$${formatCOP(b)}</p>
      <p class="text-xs" style="opacity:.8">Retenido: $${formatCOP(pnd)}</p>
    </div>
    <div class="grid-2 mb-4">
      <div class="card"><p class="text-xs">Total ganado</p><p class="text-xl success font-bold">$${formatCOP(earned)}</p></div>
      <div class="card"><p class="text-xs">Comisiones</p><p class="text-xl primary font-bold">${wallet?.transactions?.filter(t=>t.type==='COMMISSION'||t.type==='PAYOUT_REQUEST').length||0}</p><p class="text-xs">movimientos</p></div>
    </div>
    <button class="btn btn-primary mb-2" onclick="page='wallet';render()">${icn('money',14)} Mi wallet</button>
    <button class="btn btn-outline" onclick="showPaymentMethod()">${icn('card',14)} ${hasMethod?'Editar datos de pago':'Registrar datos de pago'}</button>
  </div>`;
}

function renderWallet(){
  const b=wallet?.balance||0,pnd=wallet?.pendingBalance||0,earned=wallet?.totalEarned||0;
  const txs=wallet?.transactions||[];
  return `<div class="px-4 py-5 animate-fadeUp">
    <button class="text-sm primary" onclick="page='dashboard';render()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:16px">${icn('back',14)} Volver</button>
    <p class="text-lg mb-4">Mi wallet</p>
    <div class="card shadow mb-4" style="background:linear-gradient(135deg,#0066FF,#003DA6);color:#fff;border:none">
      <p class="text-xs" style="opacity:.8">Balance disponible</p>
      <p class="text-3xl font-bold" style="margin:4px 0">$${formatCOP(b)}</p>
      <p class="text-xs" style="opacity:.8">Retenido: $${formatCOP(pnd)}</p>
    </div>
    <div class="grid-2 mb-4">
      <div class="card"><p class="text-xs">Total ganado</p><p class="text-xl success font-bold">$${formatCOP(earned)}</p></div>
      <div class="card"><p class="text-xs">Próximo pago</p><p class="text-xl primary font-bold">$${formatCOP(b)}</p></div>
    </div>
    <p class="text-sm font-semibold mb-3">Movimientos</p>
    ${txs.length===0?'<p class="text-xs" style="color:#9CA3AF;text-align:center;padding:20px">Sin movimientos aún</p>':
    txs.map(t=>{
      const isPayout=t.type==='PAYOUT'||t.type==='PAYOUT_REQUEST';
      const isPos=t.type==='COMMISSION'||t.type==='ADJUSTMENT';
      return `<div class="flex items-center gap-3" style="padding:10px 0;border-bottom:1px solid #F3F4F6">
        <div style="width:36px;height:36px;border-radius:50%;background:${isPos?'#ECFDF5':'#FEF2F2'};display:flex;align-items:center;justify-content:center;font-size:16px">${isPos?icn('money',14):isPayout?icn('card',14):icn('sales',14)}</div>
        <div class="flex-1"><p class="text-sm" style="font-weight:500">${t.description||(t.type==='PAYOUT_REQUEST'?'Solicitud de pago':t.type)}</p><p class="text-xs" style="color:#9CA3AF">${t.created_at?.split(' ')[0]||''}</p></div>
        <p class="text-sm font-semibold" style="color:${isPos?'#059669':'#DC2626'}">${isPos?'+':''}$${formatCOP(Math.abs(t.amount||0))}</p>
      </div>`;
    }).join('')}
    <button class="btn btn-success mt-4" onclick="showPayoutForm()" ${b<=0?'disabled style="opacity:.5"':''}>${b<=0?'Sin saldo disponible':(icn('card',14)+' Solicitar pago')}</button>
  </div>`;
}

function showPaymentMethod(){
  const pm=wallet?.payoutMethod||{};
  document.getElementById('app').innerHTML+=`<div class="modal" onclick="if(event.target===this)this.remove()">
    <div class="modal-content animate-fadeUp">
      <h2>${icn('card',14)} Mis datos de pago</h2>
      <p class="text-xs mb-4">Registra tus datos para recibir pagos automáticamente</p>
      <label>Medio de pago</label>
      <select id="pm-method" onchange="document.getElementById('pm-bank-fields').style.display=this.value==='BANK'?'block':'none';document.getElementById('pm-nequi-field').style.display=this.value==='NEQUI'?'block':'none'">
        <option value="BANK" ${pm.method==='BANK'?'selected':''}>Consignación bancaria</option>
        <option value="NEQUI" ${pm.method==='NEQUI'?'selected':''}>Nequi</option>
      </select>
      <div id="pm-bank-fields" style="display:${pm.method==='NEQUI'?'none':'block'}">
        <label>Banco</label>
        <input id="pm-bank" value="${pm.bank||''}" placeholder="Ej: Bancolombia, Davivienda...">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label>Tipo</label><select id="pm-account-type"><option value="AHORROS" ${pm.accountType==='AHORROS'?'selected':''}>Ahorros</option><option value="CORRIENTE" ${pm.accountType==='CORRIENTE'?'selected':''}>Corriente</option></select></div>
          <div><label>Número</label><input id="pm-account-number" value="${pm.accountNumber||''}" placeholder="Número de cuenta"></div>
        </div>
        <label>Titular</label>
        <input id="pm-holder" value="${pm.holder||''}" placeholder="Nombre del titular">
      </div>
      <div id="pm-nequi-field" style="display:${pm.method==='NEQUI'?'block':'none'}">
        <label>Número Nequi</label>
        <input id="pm-nequi-phone" value="${pm.phone||''}" placeholder="300 123 4567" type="tel">
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary flex-1" onclick="savePaymentMethod()">Guardar</button>
        <button class="btn btn-outline" onclick="this.closest('.modal').remove()">Cancelar</button>
      </div>
    </div>
  </div>`;
  if(pm.method==='NEQUI'){document.getElementById('pm-bank-fields').style.display='none';document.getElementById('pm-nequi-field').style.display='block';}
}
async function savePaymentMethod(){
  const method=document.getElementById('pm-method')?.value;
  const body={referrerId:userId,method};
  if(method==='BANK'){
    body.bankName=document.getElementById('pm-bank')?.value;
    body.accountType=document.getElementById('pm-account-type')?.value;
    body.accountNumber=document.getElementById('pm-account-number')?.value;
    body.accountHolder=document.getElementById('pm-holder')?.value;
    if(!body.bankName||!body.accountNumber||!body.accountHolder)return alert('Completa los datos bancarios');
  } else {
    body.nequiPhone=document.getElementById('pm-nequi-phone')?.value;
    if(!body.nequiPhone)return alert('Ingresa el número de Nequi');
  }
  const r=await API.post('/api/v1/wallet/payment-method',body);
  if(!r)return alert('Error al guardar');
  document.querySelector('.modal')?.remove();
  wallet=await API.get('/api/v1/wallet?referrerId='+userId);
  render();
}
function showPayoutForm(){
  const b=wallet?.balance||0;
  const pm=wallet?.payoutMethod||{};
  const isBank=pm.method==='BANK';
  document.getElementById('app').innerHTML+=`<div class="modal" onclick="if(event.target===this)this.remove()">
    <div class="modal-content animate-fadeUp">
      <h2>${icn('card',14)} Solicitar pago</h2>
      <p class="text-xs mb-4">Saldo disponible: <strong>$${formatCOP(b)}</strong></p>
      <label>Monto a retirar</label>
      <input id="payout-amount" type="number" max="${b}" placeholder="0" style="font-size:20px;font-weight:700">
      <label>Medio de pago</label>
      <select id="payout-method" onchange="document.getElementById('bank-fields').style.display=this.value==='BANK'?'block':'none';document.getElementById('nequi-field').style.display=this.value==='NEQUI'?'block':'none'">
        <option value="BANK" ${isBank?'selected':''}>Consignación bancaria</option>
        <option value="NEQUI" ${!isBank?'selected':''}>Nequi</option>
      </select>
      <div id="bank-fields" style="display:${isBank?'block':'none'}">
        <label>Banco</label>
        <input id="payout-bank" value="${pm.bank||''}" placeholder="Ej: Bancolombia, Davivienda...">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label>Tipo</label><select id="payout-account-type"><option value="AHORROS" ${pm.accountType==='AHORROS'?'selected':''}>Ahorros</option><option value="CORRIENTE" ${pm.accountType==='CORRIENTE'?'selected':''}>Corriente</option></select></div>
          <div><label>Número</label><input id="payout-account-number" value="${pm.accountNumber||''}" placeholder="Número de cuenta"></div>
        </div>
        <label>Titular</label>
        <input id="payout-holder" value="${pm.holder||''}" placeholder="Nombre del titular">
      </div>
      <div id="nequi-field" style="display:${!isBank?'block':'none'}">
        <label>Número Nequi</label>
        <input id="payout-nequi-phone" value="${pm.phone||''}" placeholder="300 123 4567" type="tel">
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-success flex-1" onclick="submitPayout()">Solicitar</button>
        <button class="btn btn-outline" onclick="this.closest('.modal').remove()">Cancelar</button>
      </div>
    </div>
  </div>`;
}
async function submitPayout(){
  const amount=parseInt(document.getElementById('payout-amount')?.value);
  const method=document.getElementById('payout-method')?.value;
  if(!amount||amount<=0)return alert('Ingresa un monto válido');
  if(amount>(wallet?.balance||0))return alert('Monto supera el saldo disponible');
  const body={referrerId:userId,amount,method};
  if(method==='BANK'){
    body.bankName=document.getElementById('payout-bank')?.value;
    body.accountType=document.getElementById('payout-account-type')?.value;
    body.accountNumber=document.getElementById('payout-account-number')?.value;
    body.accountHolder=document.getElementById('payout-holder')?.value;
    if(!body.bankName||!body.accountNumber||!body.accountHolder)return alert('Completa los datos bancarios');
  } else {
    body.nequiPhone=document.getElementById('payout-nequi-phone')?.value;
    if(!body.nequiPhone)return alert('Ingresa el número de Nequi');
  }
  const r=await API.post('/api/v1/wallet/payout-request',body);
  if(!r)return alert('Error al solicitar pago');
  document.querySelector('.modal')?.remove();
  wallet=await API.get('/api/v1/wallet?referrerId='+userId);
  render();
}
</script>
</body>
</html>
