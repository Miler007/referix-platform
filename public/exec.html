<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Referix — Executive</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#F3F4F6;min-height:100vh}
.nav{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-logo div{width:32px;height:32px;background:#0066FF;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
.nav-logo span{font-size:18px;font-weight:700;color:#111827}
.nav a{color:#6B7280;text-decoration:none;font-size:13px}
.nav a:hover{color:#0066FF}
.container{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
p{font-size:14px;color:#6B7280;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #E5E7EB}
.card .num{font-size:28px;font-weight:700;color:#111827}
.card .label{font-size:12px;color:#6B7280;margin-top:4px}
.card .trend-up{color:#059669;font-size:12px}
.card .trend-down{color:#DC2626;font-size:12px}
h2{font-size:16px;font-weight:600;color:#111827;margin-bottom:12px}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-logo"><div>R</div><span>Executive Dashboard</span></div>
  <a href="/">← Salir</a>
</div>
<div class="container">
  <h1>Indicadores</h1>
  <p>INTERPLAY — Resumen ejecutivo</p>
  <div class="grid">
    <div class="card"><div class="num">47</div><div class="label">Ventas del mes</div><div class="trend-up">↑ 15% vs mes anterior</div></div>
    <div class="card"><div class="num">$18.45M</div><div class="label">Ingreso recurrente</div><div class="trend-up">↑ 22%</div></div>
    <div class="card"><div class="num">52</div><div class="label">Instalaciones del mes</div><div class="trend-up">↑ 8%</div></div>
    <div class="card"><div class="num">12</div><div class="label">Pendientes</div><div class="trend-down">↓ 3%</div></div>
    <div class="card"><div class="num">94.2%</div><div class="label">SLA cumplimiento</div><div class="trend-up">↑ 2%</div></div>
    <div class="card"><div class="num">$3.24M</div><div class="label">Comisiones retenidas</div><div class="trend-down">Sin cambios</div></div>
  </div>
</div>
</body>
</html>
