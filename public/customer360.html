<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Customer 360</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>:root{--primary:#0066FF;--success:#059669;--warning:#D97706;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--transition:all .2s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
body{background:var(--gray-50);min-height:100vh;font-feature-settings:'cv02','cv03','cv04','cv11'}
::selection{background:var(--primary);color:#fff}
.nav{background:#fff;border-bottom:1px solid var(--gray-100);padding:14px 24px;display:flex;align-items:center;gap:12px}
.nav .back{color:var(--primary);text-decoration:none;font-size:13px;cursor:pointer;transition:var(--transition)}
.nav .back:hover{opacity:.8}
.nav .title{font-size:16px;font-weight:600;color:var(--gray-900);letter-spacing:-.2px}
.search-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:20px 24px}
.search-bar input{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:14px;outline:none;transition:var(--transition);font-family:'Inter',sans-serif}
.search-bar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.container{max-width:900px;margin:0 auto;padding:20px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border-radius:14px;border:1px solid var(--gray-100);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);transition:var(--transition)}
.card:hover{box-shadow:var(--shadow-lg)}
.card-body{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.field{margin-bottom:6px}
.field .label{font-size:11px;color:var(--gray-400);margin-bottom:2px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.field .value{font-size:13px;color:var(--gray-900);font-weight:500}
.status-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.2px}
.status-active{background:#ECFDF5;color:var(--success)}
.status-pending{background:#FFFBEB;color:var(--warning)}
.status-inactive{background:#FEF2F2;color:#DC2626}
.result-item{padding:14px 20px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:var(--transition)}
.result-item:hover{background:var(--gray-50)}
.result-item:last-child{border-bottom:none}
.result-item .name{font-size:14px;font-weight:600;color:var(--gray-900);letter-spacing:-.1px}
.result-item .info{font-size:11px;color:var(--gray-400);margin-top:4px}
.empty{text-align:center;padding:48px 16px;color:var(--gray-400);font-size:13px}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}.container{padding:12px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="/icons.js"></script>
<script>
const _user=JSON.parse(localStorage.getItem('referix_user')||'{}');
const API='https://referix-api.reto-diario.workers.dev';
const H={'Content-Type':'application/json','X-Tenant-Id':'interplay','X-User-Id':_user.id||''};
let state='search',results=[],client=null,clientDetail=null;

async function api(p){try{const r=await fetch(API+p,{headers:H});if(!r.ok)return null;return(await r.json()).data}catch(e){return null}}

function render(){document.getElementById('app').innerHTML=state==='search'?renderSearch():state==='results'?renderResults():renderDetail();}

function renderSearch(){return`<div class="nav"><span style="font-weight:700;color:#0066FF">Referix</span><span style="color:#9CA3AF">/</span><span class="title">Customer 360</span></div>
<div class="search-bar"><input id="q" placeholder="Buscar por nombre o teléfono..." onkeydown="if(event.key==='Enter')search()">
<div style="margin-top:8px;display:flex;gap:8px"><button onclick="search()" style="padding:8px 20px;background:#0066FF;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">Buscar</button>
<span style="font-size:11px;color:#9CA3AF;display:flex;align-items:center">Ej: María, 3001234567</span></div></div>
<div class="container"><div class="empty">${icn('search',14)} Ingresa el nombre o teléfono del cliente</div></div>`;}

async function search(){
  const q=document.getElementById('q').value;if(!q)return;
  results=await api('/api/v1/clients/search?q='+encodeURIComponent(q))||[];
  state='results';render();
}

function renderResults(){return`<div class="nav"><span style="font-weight:700;color:#0066FF">Referix</span><span style="color:#9CA3AF">/</span><span class="title">Customer 360</span><a class="back" onclick="state='search';render()" style="margin-left:auto">${icn('back',14)} Nueva búsqueda</a></div>
<div class="container"><div class="card"><div style="padding:12px 16px;border-bottom:1px solid #F3F4F6;font-size:13px;color:#6B7280">${results.length} resultado(s)</div>
${results.length===0?'<div class="empty">Sin resultados</div>':results.map(r=>`<div class="result-item" onclick="selectClient('${r.id}','${(r.full_name||'').replace(/'/g,"\\'")}')"><div class="name">${r.full_name||'Cliente'}</div><div class="info">${r.phone||''} · ${r.email||''} · <span class="status-badge ${r.funnel_status==='WON'||r.funnel_status==='ACTIVE'?'status-active':'status-pending'}">${r.funnel_status||''}</span></div></div>`).join('')}</div></div>`;}

async function selectClient(id,name){
  state='detail';render();
  client={id,name};
  const ref=await api('/api/v1/referrals/'+id);
  const comms=await api('/api/v1/commissions/my-commissions');
  const myComm=comms?.commissions?.filter(c=>c.referral_id===id)||[];
  clientDetail={...ref,commissions:myComm};
  render();
}

function renderDetail(){
  const c=clientDetail||client||{};
  const planName=c.plan_name||c.plan||'Plan no asignado';
  const status=c.funnel_status||c.status||'NUEVO';
  const totalComm=c.commissions?.reduce((s,cm)=>s+(cm.final_amount||0),0)||0;
  const commCount=c.commissions?.length||0;
  return`<div class="nav"><a class="back" onclick="state='results';render()">${icn('back',14)} Resultados</a><span style="color:#9CA3AF">/</span><span class="title">${c.full_name||client?.name||'Cliente'}</span><span style="margin-left:auto"><span class="status-badge ${status==='WON'||status==='ACTIVE'?'status-active':'status-pending'}">${status}</span></span></div>
  <div class="container">
    <div class="card"><div class="card-body">
      <div style="display:flex;align-items:center;gap:16px">
        <div style="width:56px;height:56px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0066FF">${(c.full_name||client?.name||'?')[0]}</div>
        <div><div style="font-size:18px;font-weight:700">${c.full_name||client?.name||'Cliente'}</div>
        <div style="font-size:12px;color:#6B7280;margin-top:4px">${c.phone||''}${c.email?' · '+c.email:''}</div>
        <div style="display:flex;gap:8px;margin-top:8px"><span class="status-badge status-active">${status}</span><span class="status-badge" style="background:#EFF6FF;color:#0066FF">${planName}</span></div></div>
      </div>
    </div></div>
    <div class="grid-3">
      <div class="card" style="padding:16px"><div class="field"><div class="label">Registro</div><div class="value">${c.created_at?new Date(c.created_at+'Z').toLocaleDateString('es-CO',{day:'numeric',month:'short'}):'—'}</div></div></div>
      <div class="card" style="padding:16px"><div class="field"><div class="label">Comisiones</div><div class="value" style="color:#059669">${commCount} ($${totalComm.toLocaleString('es-CO')})</div></div></div>
      <div class="card" style="padding:16px"><div class="field"><div class="label">Dirección</div><div class="value">${c.address||'—'}</div></div></div>
    </div>
    <div class="card"><div class="card-body">
      <p style="font-size:13px;font-weight:600;margin-bottom:12px">${icn('document',14)} Información del cliente</p>
      <div class="grid-2">
        <div><div class="field"><div class="label">Nombre</div><div class="value">${c.full_name||client?.name||'—'}</div></div></div>
        <div><div class="field"><div class="label">Teléfono</div><div class="value">${c.phone||'—'}</div></div></div>
        <div><div class="field"><div class="label">Email</div><div class="value">${c.email||'—'}</div></div></div>
        <div><div class="field"><div class="label">Dirección</div><div class="value">${c.address||'—'}</div></div></div>
        <div><div class="field"><div class="label">Plan</div><div class="value">${planName}</div></div></div>
        <div><div class="field"><div class="label">Estado</div><div class="value">${status}</div></div></div>
      </div>
    </div></div>
    ${commCount>0?`<div class="card"><div class="card-body"><p style="font-size:13px;font-weight:600;margin-bottom:8px">${icn('money',14)} Comisiones generadas</p>${c.commissions.map(cm=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6;font-size:12px"><span>$${(cm.final_amount||0).toLocaleString('es-CO')}</span><span class="status-badge ${cm.financial_state==='PAID'?'status-active':'status-pending'}">${cm.financial_state==='PAID'?'Pagado':cm.financial_state==='PAYABLE'?'Por pagar':'Pendiente'}</span></div>`).join('')}</div></div>`:''}
  </div>`;
}
render();
</script>
</body>
</html>
